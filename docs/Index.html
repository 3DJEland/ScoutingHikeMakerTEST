<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Scouting Route Builder</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=DM+Serif+Display&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:#f5f4f0;color:#1a1a1a;min-height:100vh;display:flex;flex-direction:column}

/* ── top bar ── */
#topbar{height:36px;background:#fff;border-bottom:0.5px solid rgba(0,0,0,0.12);display:flex;align-items:center;justify-content:space-between;padding:0 12px;flex-shrink:0;position:relative;z-index:100}
#files-btn{background:transparent;border:0.5px solid rgba(0,0,0,0.15);border-radius:6px;padding:4px 10px;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;color:#1a1a1a;cursor:pointer;display:flex;align-items:center;gap:5px;transition:background .1s}
#files-btn:hover{background:#f5f4f0}
#files-btn svg{width:12px;height:12px;transition:transform .15s}
#files-btn.open svg{transform:rotate(180deg)}
#topbar-tagline{font-size:11px;color:#aaa;font-style:italic}

/* dropdown */
#files-dropdown{position:absolute;top:40px;left:12px;background:#fff;border:0.5px solid rgba(0,0,0,0.12);border-radius:8px;box-shadow:0 4px 16px rgba(0,0,0,0.08);min-width:160px;overflow:hidden;display:none;z-index:200}
#files-dropdown.open{display:block}
.dd-item{display:flex;align-items:center;gap:10px;padding:9px 14px;font-size:13px;color:#1a1a1a;cursor:pointer;transition:background .1s;border:none;background:transparent;width:100%;text-align:left;font-family:'DM Sans',sans-serif}
.dd-item:hover{background:#f5f4f0}
.dd-item svg{width:14px;height:14px;flex-shrink:0;opacity:0.5}
.dd-divider{height:0.5px;background:rgba(0,0,0,0.08);margin:3px 0}

/* ── main layout ── */
#app{display:flex;flex:1;min-height:0}
#techbar{width:200px;border-right:0.5px solid rgba(0,0,0,0.12);background:#fff;padding:1.25rem .9rem;position:sticky;top:0;height:calc(100vh - 36px);overflow-y:auto;flex-shrink:0}
.tb-head{font-size:10px;font-weight:500;letter-spacing:.07em;text-transform:uppercase;color:#888;margin-bottom:.9rem}
.topt{display:flex;align-items:center;gap:8px;padding:7px 8px;border-radius:8px;cursor:pointer;border:0.5px solid transparent;margin-bottom:3px;transition:background .1s}
.topt:hover{background:#f5f4f0}
.topt-icon{width:26px;height:26px;flex-shrink:0;display:flex;align-items:center;justify-content:center}
.topt-name{font-size:12px;color:#1a1a1a;line-height:1.3}
#main{flex:1;padding:2rem 1.75rem 4rem;min-width:0;overflow-y:auto}
.header{margin-bottom:2rem;padding-bottom:1.5rem;border-bottom:0.5px solid rgba(0,0,0,0.12)}
.t-title{font-family:'DM Serif Display',serif;font-size:30px;background:transparent;border:none;outline:none;color:#1a1a1a;width:100%;display:block;margin-bottom:.4rem}
.t-title::placeholder,.t-sub::placeholder{color:#bbb}
.t-sub{font-size:14px;background:transparent;border:none;outline:none;color:#666;width:100%;display:block}
.grid{display:grid;grid-template-columns:repeat(auto-fill,100px);grid-auto-rows:1px;column-gap:10px;row-gap:0;grid-auto-flow:dense}
.card{background:#fff;border:0.5px solid rgba(0,0,0,0.12);border-radius:12px;padding:8px;cursor:pointer;position:relative;display:flex;flex-direction:column;align-items:center;justify-content:center;width:100px;height:100px;flex-shrink:0;align-self:start;transition:border-color .12s;overflow:visible;grid-row:span 110}
.card.resizable{overflow:visible}
.rh-r{position:absolute;top:50%;transform:translateY(-50%);right:-5px;width:6px;height:32px;cursor:ew-resize;z-index:10;border-radius:3px;background:rgba(0,0,0,0.15);transition:background .15s}
.rh-b{position:absolute;left:50%;transform:translateX(-50%);bottom:-5px;height:6px;width:32px;cursor:ns-resize;z-index:10;border-radius:3px;background:rgba(0,0,0,0.15);transition:background .15s}
.rh-c{position:absolute;bottom:4px;right:4px;width:14px;height:14px;cursor:se-resize;z-index:11;opacity:0.4;transition:opacity .15s}
.rh-r:hover{background:rgba(55,138,221,0.7) !important}
.rh-b:hover{background:rgba(55,138,221,0.7) !important}
.rh-c:hover{opacity:0.9 !important}
.card:hover{border-color:rgba(0,0,0,0.25)}
.card.sel{border:1.5px solid #378ADD;background:#e6f1fb}
.num{position:absolute;top:6px;left:8px;font-size:11px;font-weight:500;color:#aaa}
.icon{width:52px;height:52px;display:flex;align-items:center;justify-content:center}
.add-btn{margin-top:12px;background:transparent;border:0.5px dashed rgba(0,0,0,0.25);border-radius:10px;padding:9px 18px;font-family:'DM Sans',sans-serif;font-size:13px;color:#666;cursor:pointer;transition:background .12s}
.add-btn:hover{background:#eee}
#detail{width:260px;min-width:250px;max-width:500px;border-left:0.5px solid rgba(0,0,0,0.12);background:#fff;padding:1.25rem 1rem;position:sticky;top:36px;height:calc(100vh - 36px);overflow-y:auto;flex-shrink:0;box-sizing:border-box}
#detail-resize{position:absolute;left:0;top:50%;transform:translateY(-50%);width:12px;height:40px;cursor:ew-resize;display:flex;align-items:center;justify-content:center;z-index:10;border-radius:0 4px 4px 0;background:#f0f0f0;border:0.5px solid rgba(0,0,0,0.12);border-left:none;opacity:0.6;transition:opacity .15s}
#detail-resize:hover{opacity:1;background:#e6f1fb}
#detail-resize svg{display:block}
#detail-wrap{position:sticky;top:36px;height:calc(100vh - 36px);flex-shrink:0;display:flex;flex-direction:row;align-items:stretch}
.d-head{font-size:10px;font-weight:500;letter-spacing:.07em;text-transform:uppercase;color:#aaa;margin-bottom:.9rem}
.d-hint{font-size:12px;color:#aaa;line-height:1.5}
.d-stepnum{font-size:11px;color:#aaa;margin-bottom:.4rem}
.d-tname{font-size:13px;font-weight:500;color:#1a1a1a;margin-bottom:.9rem}
.div{height:0.5px;background:rgba(0,0,0,0.1);margin:.9rem 0}
.del-btn{width:100%;background:transparent;border:0.5px solid rgba(0,0,0,0.12);border-radius:8px;padding:7px;font-family:'DM Sans',sans-serif;font-size:12px;color:#666;cursor:pointer}
.del-btn:hover{background:#f5f4f0}
.sec-label{font-size:10px;font-weight:500;letter-spacing:.05em;text-transform:uppercase;color:#aaa;margin-bottom:6px;margin-top:2px}
.dir-ring{display:grid;grid-template-columns:repeat(3,1fr);gap:5px;margin-bottom:8px}
.dir-cell{aspect-ratio:1;border-radius:8px;border:0.5px solid rgba(0,0,0,0.12);display:flex;align-items:center;justify-content:center;cursor:pointer;background:#f5f4f0;transition:background .1s}
.dir-cell:hover{border-color:rgba(0,0,0,0.25)}
.dir-cell.active{background:#e6f1fb;border-color:#378ADD}
.dir-cell.disabled{opacity:0.2;cursor:default;pointer-events:none}
.dir-cell.empty{border:none;background:transparent;cursor:default}
.g-card{display:flex;align-items:center;justify-content:center;width:52px;height:52px}
.g-card span{font-family:'DM Serif Display',serif;font-size:14px;line-height:1;color:#1a1a1a;text-align:center}
.g-input{width:100%;background:#f5f4f0;border:0.5px solid rgba(0,0,0,0.12);border-radius:10px;padding:14px 10px;font-family:'DM Serif Display',serif;font-size:36px;color:#1a1a1a;outline:none;text-align:center;letter-spacing:.05em}
.g-input:focus{border-color:#378ADD}
.om-btn{display:flex;align-items:center;gap:10px;width:100%;padding:9px 12px;border-radius:8px;border:0.5px solid rgba(0,0,0,0.12);background:#f5f4f0;cursor:pointer;margin-bottom:8px;transition:background .1s;font-family:'DM Sans',sans-serif}
.om-btn:hover{background:#fff;border-color:rgba(0,0,0,0.2)}
.om-btn.active{background:#e6f1fb;border-color:#378ADD}
.om-check{width:16px;height:16px;border-radius:3px;border:1.5px solid rgba(0,0,0,0.25);flex-shrink:0;display:flex;align-items:center;justify-content:center;background:#fff}
.om-btn.active .om-check{background:#378ADD;border-color:#378ADD}
.om-check-tick{display:none;width:10px;height:10px}
.om-btn.active .om-check-tick{display:block}
.om-label{font-size:13px;color:#1a1a1a;flex:1;text-align:left}
.om-tag{font-family:'DM Serif Display',serif;font-size:12px;font-weight:500;padding:2px 7px;border-radius:4px;background:#e6f1fb;color:#185FA5}
.om-btn.active .om-tag{background:#378ADD;color:white}
.heli-arrow-row{display:flex;align-items:center;gap:8px;margin-bottom:7px}
.heli-arrow-label{font-size:12px;font-weight:500;color:#378ADD;width:20px;flex-shrink:0;text-align:center}
.heli-deg-input{flex:1;background:#f5f4f0;border:0.5px solid rgba(0,0,0,0.12);border-radius:8px;padding:6px 8px;font-family:'DM Serif Display',serif;font-size:18px;color:#1a1a1a;outline:none;text-align:center}
.heli-deg-input:focus{border-color:#378ADD}
.heli-deg-sym{font-size:13px;color:#aaa;flex-shrink:0}
.count-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.count-btn{width:26px;height:26px;border:0.5px solid rgba(0,0,0,0.12);border-radius:6px;background:#f5f4f0;font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#1a1a1a}
.count-btn:hover{background:#fff;border-color:rgba(0,0,0,0.25)}
.count-num{font-size:13px;font-weight:500;color:#1a1a1a;min-width:16px;text-align:center}
.strip-side-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.strip-side-label{font-size:12px;color:#666}
.eye-dir-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:10px}
.eye-dir-cell{aspect-ratio:1;border-radius:8px;border:0.5px solid rgba(0,0,0,0.12);display:flex;align-items:center;justify-content:center;cursor:pointer;background:#f5f4f0;transition:background .1s}
.eye-dir-cell:hover{border-color:rgba(0,0,0,0.25)}
.eye-dir-cell.active{background:#e6f1fb;border-color:#378ADD}
#junc-canvas-wrap{position:relative;width:230px;height:230px;margin:0 auto 12px;border-radius:10px;border:0.5px solid rgba(0,0,0,0.12);background:#f5f4f0;flex-shrink:0}
#junc-canvas{display:block;border-radius:10px}
.junc-street-row{display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:0.5px solid rgba(0,0,0,0.08)}
.junc-street-row:last-child{border-bottom:none}
.junc-street-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.junc-street-label{font-size:12px;color:#666;flex:1}
.junc-arrow-check{width:16px;height:16px;cursor:pointer;flex-shrink:0;accent-color:#378ADD}
.junc-add-btn{width:100%;background:transparent;border:0.5px dashed rgba(0,0,0,0.2);border-radius:8px;padding:6px;font-family:'DM Sans',sans-serif;font-size:12px;color:#666;cursor:pointer;margin-top:8px}
.junc-add-btn:hover{background:#f5f4f0}
/* sign dropdown */
.sign-dd{position:relative;margin-bottom:8px}
.sign-dd-btn{display:flex;align-items:center;gap:8px;width:100%;padding:7px 10px;border-radius:8px;border:0.5px solid rgba(0,0,0,0.15);background:#f5f4f0;cursor:pointer;font-family:'DM Sans',sans-serif}
.sign-dd-btn:hover{background:#fff;border-color:rgba(0,0,0,0.25)}
.sign-dd-name{font-size:12px;color:#1a1a1a;flex:1;text-align:left}
.sign-dd-placeholder{font-size:12px;color:#aaa;flex:1;text-align:left}
.sign-dd-caret{width:12px;height:12px;flex-shrink:0;color:#888;transition:transform .15s}
.sign-dd.open .sign-dd-caret{transform:rotate(180deg)}
.sign-dd-list{display:none;position:absolute;top:calc(100% + 4px);left:0;right:0;max-height:280px;overflow-y:auto;background:#fff;border:0.5px solid rgba(0,0,0,0.15);border-radius:8px;box-shadow:0 4px 16px rgba(0,0,0,0.1);z-index:50;padding:4px}
.sign-dd.open .sign-dd-list{display:block}
.sign-dd-item{display:flex;align-items:center;gap:8px;width:100%;padding:6px 8px;border-radius:6px;border:none;background:transparent;cursor:pointer;font-family:'DM Sans',sans-serif;text-align:left}
.sign-dd-item:hover{background:#f5f4f0}
.sign-dd-item.sel{background:#e6f1fb}
.sign-dd-itemname{font-size:12px;color:#1a1a1a}
.sign-dd-noicon{width:30px;height:30px;flex-shrink:0}
.sign-dd-serie{font-size:10px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;color:#aaa;padding:6px 8px 3px}
.junc-del-btn{width:18px;height:18px;border:none;background:transparent;cursor:pointer;color:#aaa;font-size:14px;padding:0;flex-shrink:0;display:flex;align-items:center;justify-content:center}
.junc-del-btn:hover{color:#1a1a1a}

/* export overlay */
#export-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:500;align-items:center;justify-content:center}
#export-overlay.show{display:flex}
#export-box{background:#fff;border-radius:14px;padding:0;width:620px;max-width:96vw;max-height:90vh;display:flex;flex-direction:column;overflow:hidden}
#export-box h3{font-family:'DM Serif Display',serif;font-size:18px;margin:0}
.exp-head{padding:20px 24px 16px;border-bottom:0.5px solid rgba(0,0,0,0.1);display:flex;align-items:center;justify-content:space-between}
.exp-close{background:transparent;border:none;font-size:18px;cursor:pointer;color:#aaa;line-height:1;padding:0}
.exp-close:hover{color:#1a1a1a}
.exp-body{display:flex;flex:1;min-height:0;overflow:hidden}
.exp-settings{width:180px;flex-shrink:0;padding:18px 16px;border-right:0.5px solid rgba(0,0,0,0.1);display:flex;flex-direction:column;gap:14px}
.exp-preview{flex:1;padding:16px;overflow-y:auto;background:#f5f4f0}
.exp-foot{padding:14px 20px;border-top:0.5px solid rgba(0,0,0,0.1);display:flex;gap:8px;justify-content:flex-end}
.exp-lbl{font-size:10px;font-weight:500;letter-spacing:.06em;text-transform:uppercase;color:#aaa;margin-bottom:6px}
.exp-cols-row{display:flex;gap:6px;flex-wrap:wrap}
.exp-col-btn{width:34px;height:34px;border-radius:7px;border:0.5px solid rgba(0,0,0,0.15);background:#f5f4f0;font-size:13px;font-weight:500;cursor:pointer;font-family:'DM Sans',sans-serif;color:#1a1a1a;transition:background .1s}
.exp-col-btn:hover{background:#e6f1fb;border-color:#378ADD}
.exp-col-btn.active{background:#378ADD;border-color:#378ADD;color:white}
.exp-dl-btn{padding:9px 20px;border-radius:8px;border:none;background:#378ADD;color:white;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;cursor:pointer}
.exp-dl-btn:hover{background:#185FA5}
.exp-cancel-btn{padding:9px 16px;border-radius:8px;border:0.5px solid rgba(0,0,0,0.15);background:transparent;font-family:'DM Sans',sans-serif;font-size:13px;color:#666;cursor:pointer}
.exp-cancel-btn:hover{background:#f5f4f0}
#exp-preview-grid{display:grid;gap:6px}
.exp-card{background:#fff;border-radius:8px;border:0.5px solid rgba(0,0,0,0.12);position:relative;overflow:hidden}
.exp-card-num{position:absolute;top:4px;left:5px;font-size:9px;font-weight:700;color:#555;font-family:'DM Sans',sans-serif;z-index:2;line-height:1}
.exp-card img{display:block;width:100%;height:100%;object-fit:contain;padding:6px}

/* ── mobile drawers + side-tab handles ── */
.drawer-tab{display:none}
#mobile-scrim{display:none}

@media (max-width:820px){
  /* protruding tab handles attached to each drawer's inner edge */
  .drawer-tab{
    display:flex;align-items:center;justify-content:center;
    position:absolute;top:10px;
    writing-mode:vertical-rl;
    background:#fff;border:0.5px solid rgba(0,0,0,0.12);
    font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;
    letter-spacing:.02em;color:#1a1a1a;
    padding:14px 7px;cursor:pointer;z-index:5;
    -webkit-tap-highlight-color:transparent
  }
  #tech-tab{
    left:100%;border-left:none;
    border-radius:0 12px 12px 0;
    box-shadow:3px 1px 10px rgba(0,0,0,0.10)
  }
  #detail-tab{
    right:100%;border-right:none;
    border-radius:12px 0 0 12px;
    box-shadow:-3px 1px 10px rgba(0,0,0,0.10)
  }

  /* left drawer: technieken */
  #techbar{
    position:fixed;left:0;top:36px;overflow:visible;
    height:calc(100vh - 36px);width:240px;max-width:80vw;
    transform:translateX(-100%);
    transition:transform .25s ease;
    z-index:400;box-shadow:2px 0 18px rgba(0,0,0,0.14)
  }
  #techbar.drawer-open{transform:translateX(0)}

  /* right drawer: aanpassen */
  #detail-wrap{
    position:fixed;right:0;top:36px;
    height:calc(100vh - 36px);
    transform:translateX(100%);
    transition:transform .25s ease;
    z-index:400;box-shadow:-2px 0 18px rgba(0,0,0,0.14)
  }
  #detail-wrap.drawer-open{transform:translateX(0)}
  #detail{
    position:static;top:auto;
    width:300px;max-width:84vw;min-width:0;
    height:calc(100vh - 36px)
  }
  #detail-resize{display:none}

  #main{padding:1.25rem 1rem 4rem}
  .t-title{font-size:24px}
  .grid{column-gap:8px}

  /* scrim behind open drawer */
  #mobile-scrim{
    position:fixed;left:0;right:0;top:36px;bottom:0;
    background:rgba(0,0,0,0.32);z-index:350
  }
  #mobile-scrim.show{display:block}
}
</style>
</head>
<body>

<!-- TOP BAR -->
<div id="topbar">
  <div style="position:relative">
    <button id="files-btn" onclick="toggleDD()">
      Files
      <svg viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><polyline points="2,4 6,8 10,4"/></svg>
    </button>
    <div id="files-dropdown">
      <button class="dd-item" onclick="fileNew()">
        <svg viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"><rect x="2" y="1" width="8" height="11" rx="1.5"/><line x1="4" y1="5" x2="8" y2="5"/><line x1="4" y1="7.5" x2="8" y2="7.5"/></svg>
        Nieuw
      </button>
      <div class="dd-divider"></div>
      <button class="dd-item" onclick="fileSave()">
        <svg viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"><path d="M2 2h8l2 2v8a1 1 0 01-1 1H3a1 1 0 01-1-1V2z"/><rect x="4" y="8" width="6" height="4" rx="0.5"/><rect x="4" y="2" width="5" height="3" rx="0.5"/></svg>
        Opslaan
      </button>
      <button class="dd-item" onclick="fileOpen()">
        <svg viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"><path d="M1 4h5l1.5 2H13v6H1z"/></svg>
        Openen
      </button>
      <div class="dd-divider"></div>
      <button class="dd-item" onclick="fileExport()">
        <svg viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"><path d="M7 1v8M4 6l3 3 3-3"/><path d="M2 10v2h10v-2"/></svg>
        Exporteren als PDF
      </button>
    </div>
  </div>
  <span id="topbar-tagline">Made by scouts for scouts</span>
</div>

<!-- scrim behind open mobile drawer -->
<div id="mobile-scrim" onclick="closeDrawers()"></div>

<!-- hidden file input for Open -->
<input type="file" id="file-input" accept=".json" style="display:none" onchange="handleOpen(this)"/>

<!-- MAIN APP -->
<div id="app">
  <div id="techbar">
    <div id="tech-tab" class="drawer-tab" onclick="toggleTech()">Technieken</div>
    <div style="margin-bottom:1rem;padding-bottom:1rem;border-bottom:0.5px solid rgba(0,0,0,0.1)">
      <p class="tb-head" style="margin-bottom:8px">Aantal stappen</p>
      <div style="display:flex;gap:5px;align-items:center">
        <button onclick="setTotalStepsDirect(steps.length-1)" style="width:28px;height:28px;border-radius:6px;border:0.5px solid rgba(0,0,0,0.15);background:#f5f4f0;font-size:15px;cursor:pointer;font-family:'DM Sans',sans-serif;color:#1a1a1a;flex-shrink:0">−</button>
        <input type="text" inputmode="numeric" maxlength="3" id="total-count"
          style="flex:1;min-width:0;text-align:center;background:#f5f4f0;border:0.5px solid rgba(0,0,0,0.15);border-radius:6px;padding:5px 4px;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:500;color:#1a1a1a;outline:none"
          onfocus="this.select()" oninput="this.value=this.value.replace(/\D/g,'')" onblur="setTotalSteps(this)" onkeydown="if(event.key==='Enter')this.blur()" value="0"/>

let expCols=4;
let _expPngs=null;

function setExpCols(n){
  expCols=n;
  document.querySelectorAll('.exp-col-btn').forEach(b=>b.classList.toggle('active',parseInt(b.textContent)===n));
  renderExpPreview();

function renderExpPreview(){
  const container=document.getElementById('exp-preview-grid');
  if(!container||!_expPngs)return;

  // A4 proportions: 210x297mm. Preview width = container width.
  const previewW=container.parentElement.clientWidth-32;
  const previewH=Math.round(previewW*(297/210));
  const scale=previewW/210; // px per mm

  // Same constants as doExport
  const pageW=210,marginL=16,marginR=16,marginT=20;
  const cols=expCols,colGap=5,rowGap=5;
  const colW=Math.floor((pageW-marginL-marginR-(cols-1)*colGap)/cols);

  function spanC(s){const isR=s.tid==='helicopter'||s.tid==='stripkaart';if(!isR)return 1;return Math.max(1,Math.round(((s.card_w||100)+10)/110));}
  function spanR(s){const isR=s.tid==='helicopter'||s.tid==='stripkaart';if(!isR)return 1;return Math.max(1,Math.round(((s.card_h||100)+10)/110));}

  // build same 2D occupancy grid
  const MAX_ROWS=200;
  const occ=Array.from({length:MAX_ROWS},()=>new Array(cols).fill(false));
  function findPlace(sc,sr){for(let r=0;r<MAX_ROWS-sr;r++){for(let c=0;c<=cols-sc;c++){let ok=true;outer:for(let dr=0;dr<sr;dr++){for(let dc=0;dc<sc;dc++){if(occ[r+dr][c+dc]){ok=false;break outer;}}}if(ok)return{r,c};}}return{r:0,c:0};}
  function occupy(r,c,sc,sr){for(let dr=0;dr<sr;dr++)for(let dc=0;dc<sc;dc++)occ[r+dr][c+dc]=true;}

  const placements=steps.map(s=>{const sc=spanC(s),sr=spanR(s);const{r,c}=findPlace(sc,sr);occupy(r,c,sc,sr);return{r,c,sc,sr};});

  // render as HTML on a white A4 surface
  container.innerHTML='';
  const page=document.createElement('div');
  page.style.cssText=`position:relative;width:${previewW}px;height:${previewH}px;background:white;border-radius:4px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,0.15)`;

  // title area
  const titleEl=document.createElement('div');
  const t=document.getElementById('rTitle').value||'Route';
  const sub=document.getElementById('rSub').value||'';
  titleEl.style.cssText=`position:absolute;left:${marginL*scale}px;top:${10*scale}px;font-family:'DM Serif Display',serif;font-size:${Math.round(7*scale)}px;font-weight:bold;color:#1a1a1a;white-space:nowrap;overflow:hidden`;
  titleEl.textContent=t;
  page.appendChild(titleEl);
  if(sub){const subEl=document.createElement('div');subEl.style.cssText=`position:absolute;left:${marginL*scale}px;top:${18*scale}px;font-family:'DM Sans',sans-serif;font-size:${Math.round(3.5*scale)}px;color:#666`;subEl.textContent=sub;page.appendChild(subEl);}

  // divider
  const div=document.createElement('div');
  const divY=sub?26:18;
  div.style.cssText=`position:absolute;left:${marginL*scale}px;right:${marginR*scale}px;top:${divY*scale}px;height:0.5px;background:#ddd`;
  page.appendChild(div);

  const startY=(divY+6)*scale;
  const rowUnitPx=(colW+rowGap)*scale;
  const rowsPerPage=Math.floor((previewH-startY-marginL*scale)/rowUnitPx);

  placements.forEach((p,i)=>{
    const s=steps[i];
    const sc=p.sc,sr=p.sr;
    const wMm=sc*colW+(sc-1)*colGap;
    const hMm=sr*colW+(sr-1)*rowGap;
    const px=(marginL+p.c*(colW+colGap))*scale;
    const py=startY+(p.r%rowsPerPage)*rowUnitPx;

    if(p.r>=rowsPerPage)return; // skip overflow for preview (first page only)

    const card=document.createElement('div');
    card.style.cssText=`position:absolute;left:${px}px;top:${py}px;width:${wMm*scale}px;height:${hMm*scale}px;border-radius:${2*scale}px;overflow:hidden`;

    const numEl=document.createElement('div');
    numEl.style.cssText=`position:absolute;top:${2*scale}px;left:${2*scale}px;font-size:${Math.max(7,2.5*scale)}px;font-weight:700;color:#555;font-family:'DM Sans',sans-serif;z-index:2;line-height:1`;
    numEl.textContent=String(i+1);
    card.appendChild(numEl);

    if(_expPngs[i]){
      const img=document.createElement('img');
      img.src=_expPngs[i];
      img.style.cssText=`position:absolute;inset:${3*scale}px;width:calc(100% - ${6*scale}px);height:calc(100% - ${6*scale}px);object-fit:contain`;
      card.appendChild(img);
    }
    page.appendChild(card);
  });

  container.appendChild(page);
}

function fileExport(){
  document.getElementById('export-overlay').classList.add('show');
  // pre-render icons for preview
  const iconPx=120;
  Promise.all(steps.map(s=>{
    let svg='';
    if(s.tid==='bolletje') svg=bolSvg(s.dir_angle||0,iconPx,'#378ADD',s.dir_dashed);
    else if(s.tid==='kruispunt') svg=juncSvgCard(s.junc_streets||[],iconPx);
    else if(s.tid==='graden'){const pad=String(Math.max(1,Math.min(360,s.graden||360))).padStart(3,'0');const suf=s.oost_om?' OO':s.west_om?' WO':'';svg=`<svg width="${iconPx}" height="${iconPx}" viewBox="0 0 ${iconPx} ${iconPx}" fill="none" xmlns="http://www.w3.org/2000/svg"><text x="${iconPx/2}" y="${iconPx/2+8}" text-anchor="middle" font-size="22" font-family="Georgia,serif" font-weight="bold" fill="#534AB7">${pad}°${suf}</text></svg>`;}
    else if(s.tid==='helicopter') svg=heliSvg(s.arrows||[{deg:45},{deg:135}],iconPx);
    else if(s.tid==='oogjes') svg=eyeForDir(s.eye_dir||'rechts',iconPx);
    else if(s.tid==='wind') svg=windCard(s,iconPx);
    else if(s.tid==='lantaarn') svg=lanternCard(s,iconPx);
    else if(s.tid==='klokjes') svg=clockCard(s,iconPx);
    else if(s.tid==='stripkaart') svg=stripSvg(s.strip_steps||[{left:1,right:0}],iconPx,null);
    else if(s.tid==='foto'){
      if(!s.foto_data) return Promise.resolve(null);
      return new Promise(resolve=>{
        const img=new Image();
        img.onload=()=>{
          const c=document.createElement('canvas');
          c.width=img.naturalWidth;c.height=img.naturalHeight;
          const ctx=c.getContext('2d');
          let filter='';
          if(s.foto_blur>0){
            const displayW=s.card_w||100;
            const scale=img.naturalWidth/displayW;
            filter+=`blur(${(s.foto_blur*scale).toFixed(1)}px) `;
          }
          if(s.foto_bw) filter+='grayscale(1) ';
          if(s.foto_color) filter+='hue-rotate(120deg) saturate(3) ';
          if(filter) ctx.filter=filter.trim();
          if(s.foto_mirror){ctx.translate(c.width,0);ctx.scale(-1,1);}
          ctx.drawImage(img,0,0);
          resolve(c.toDataURL('image/png'));
        };
        img.src=s.foto_data;
      });
    }
    if(svg&&!svg.includes('xmlns')) svg=svg.replace('<svg','<svg xmlns="http://www.w3.org/2000/svg"');
    return svg?svgToPng(svg,iconPx,iconPx):Promise.resolve(null);
  })).then(pngs=>{
    _expPngs=pngs;
    setTimeout(renderExpPreview,50);
  });
  toggleDD();
}
function closeExport(){document.getElementById('export-overlay').classList.remove('show');}

// Render an SVG string to a base64 PNG via offscreen canvas
function svgToPng(svgStr,w,h){
  return new Promise(resolve=>{
    const blob=new Blob([svgStr],{type:'image/svg+xml'});
    const url=URL.createObjectURL(blob);
    const img=new Image();
    img.onload=()=>{
      const c=document.createElement('canvas');
      c.width=w;c.height=h;
      const ctx=c.getContext('2d');
      ctx.drawImage(img,0,0,w,h);
      URL.revokeObjectURL(url);
      resolve(c.toDataURL('image/png'));
    };
    img.onerror=()=>{URL.revokeObjectURL(url);resolve(null);};
    img.src=url;
  });
}

async function doExport(){
  closeExport();
  const {jsPDF}=window.jspdf;

  const title=document.getElementById('rTitle').value||'Route';
  const subtitle=document.getElementById('rSub').value||'';
  const pageW=210,pageH=297,marginL=16,marginR=16,marginT=20,marginB=18;
  const cols=expCols;
  const colGap=5;
  const colW=Math.floor((pageW-marginL-marginR-(cols-1)*colGap)/cols); // mm per col
  const rowGap=5;

  // Calculate each step's col/row span based on card_w/card_h
  // Base cell = 100px on screen. Scale: colW mm = 100px, so 1px = colW/100 mm
  const pxToMm=colW/100;
  function stepW(s){
    const isR=s.tid==='helicopter'||s.tid==='stripkaart';
    if(!isR)return colW;
    const w=s.card_w||100;
    const spanCols=Math.max(1,Math.round((w+10)/110));
    return spanCols*colW+(spanCols-1)*colGap;
  }
  function stepH(s){
    const isR=s.tid==='helicopter'||s.tid==='stripkaart';
    if(!isR)return colW; // square default
    const h=s.card_h||100;
    const spanRows=Math.max(1,Math.round((h+10)/110));
    return spanRows*colW+(spanRows-1)*rowGap;
  }
  function spanCols(s){
    const isR=s.tid==='helicopter'||s.tid==='stripkaart';
    if(!isR)return 1;
    return Math.max(1,Math.round(((s.card_w||100)+10)/110));
  }

  // pre-render icons at appropriate size
  const iconPngs=await Promise.all(steps.map(s=>{
    const isR=s.tid==='helicopter'||s.tid==='stripkaart';
    const sc=spanCols(s);
    const iconPx=Math.round(120*sc);
    let svg='';
    if(s.tid==='bolletje') svg=bolSvg(s.dir_angle||0,iconPx,'#378ADD',s.dir_dashed);
    else if(s.tid==='kruispunt') svg=juncSvgCard(s.junc_streets||[],iconPx);
    else if(s.tid==='graden'){const pad=String(Math.max(1,Math.min(360,s.graden||360))).padStart(3,'0');const suf=s.oost_om?' OO':s.west_om?' WO':'';svg=`<svg width="${iconPx}" height="${iconPx}" viewBox="0 0 ${iconPx} ${iconPx}" fill="none" xmlns="http://www.w3.org/2000/svg"><text x="${iconPx/2}" y="${iconPx/2+8}" text-anchor="middle" font-size="22" font-family="Georgia,serif" font-weight="bold" fill="#534AB7">${pad}°${suf}</text></svg>`;}
    else if(s.tid==='helicopter') svg=heliSvg(s.arrows||[{deg:45},{deg:135}],iconPx);
    else if(s.tid==='oogjes') svg=eyeForDir(s.eye_dir||'rechts',iconPx);
    else if(s.tid==='wind') svg=windCard(s,iconPx);
    else if(s.tid==='lantaarn') svg=lanternCard(s,iconPx);
    else if(s.tid==='klokjes') svg=clockCard(s,iconPx);
    else if(s.tid==='stripkaart'){
      // for stripkaart use actual proportions
      const sw=stepW(s),sh=stepH(s);
      const ratio=sh/sw;
      const spx=iconPx,hpx=Math.round(iconPx*ratio);
      svg=stripSvg(s.strip_steps||[{left:1,right:0}],spx,null);
      if(svg&&!svg.includes('xmlns')) svg=svg.replace('<svg','<svg xmlns="http://www.w3.org/2000/svg"');
      return svgToPng(svg,spx,hpx);
    }
    else if(s.tid==='foto'){
      if(!s.foto_data) return Promise.resolve(null);
      // Apply filters via canvas
      return new Promise(resolve=>{
        const img=new Image();
        img.onload=()=>{
          const c=document.createElement('canvas');
          c.width=img.naturalWidth;c.height=img.naturalHeight;
          const ctx=c.getContext('2d');
          let filter='';
          if(s.foto_blur>0){
            const displayW=s.card_w||100;
            const scale=img.naturalWidth/displayW;
            filter+=`blur(${(s.foto_blur*scale).toFixed(1)}px) `;
          }
          if(s.foto_bw) filter+='grayscale(1) ';
          if(s.foto_color) filter+='hue-rotate(120deg) saturate(3) ';
          if(filter) ctx.filter=filter.trim();
          if(s.foto_mirror){ctx.translate(c.width,0);ctx.scale(-1,1);}
          ctx.drawImage(img,0,0);
          resolve(c.toDataURL('image/png'));
        };
        img.src=s.foto_data;
      });
    }
    if(svg&&!svg.includes('xmlns')) svg=svg.replace('<svg','<svg xmlns="http://www.w3.org/2000/svg"');
    return svg?svgToPng(svg,iconPx,iconPx):Promise.resolve(null);
  }));

  const doc=new jsPDF({orientation:'portrait',unit:'mm',format:'a4'});
  let y=marginT;

  // Title
  doc.setFont('helvetica','bold');
  doc.setFontSize(22);
  doc.setTextColor(26,26,26);
  doc.text(title,marginL,y);
  y+=9;

  if(subtitle){
    doc.setFont('helvetica','normal');
    doc.setFontSize(11);
    doc.setTextColor(100,100,100);
    doc.text(subtitle,marginL,y);
    y+=7;
    doc.setTextColor(26,26,26);
  }

  doc.setDrawColor(200,200,200);
  doc.setLineWidth(0.3);
  doc.line(marginL,y,pageW-marginR,y);
  y+=8;


  // Use a 2D occupancy grid (like the editor's dense grid) to place steps
  // Each cell = one colW x colW unit
  const MAX_ROWS=200;
  const occupied=Array.from({length:MAX_ROWS},()=>new Array(cols).fill(false));

  function findPlace(sc,sr){
    for(let r=0;r<MAX_ROWS-sr;r++){
      for(let c=0;c<=cols-sc;c++){
        let fits=true;
        outer: for(let dr=0;dr<sr;dr++){
          for(let dc=0;dc<sc;dc++){
            if(occupied[r+dr][c+dc]){fits=false;break outer;}
          }
        }
        if(fits)return{r,c};
      }
    }
    return{r:0,c:0};
  }

  function occupy(r,c,sc,sr){
    for(let dr=0;dr<sr;dr++)
      for(let dc=0;dc<sc;dc++)
        occupied[r+dr][c+dc]=true;
  }

  // place all steps
  const placements=steps.map(s=>{
    const sc=spanCols(s);
    const sr=Math.max(1,Math.round(((s.card_h||100)+10)/110));
    const {r,c}=findPlace(sc,sr);
    occupy(r,c,sc,sr);
    return{r,c,sc,sr};
  });

  // find total rows used
  const maxRow=Math.max(...placements.map(p=>p.r+p.sr));

  // figure out page breaks: rows per page
  const contentH=pageH-y-marginB;
  const rowUnitMm=colW+rowGap;

  // draw each step
  placements.forEach((p,i)=>{
    const s=steps[i];
    const sw=p.sc*colW+(p.sc-1)*colGap;
    const sh=p.sr*colW+(p.sr-1)*rowGap;

    // calculate y position on page, handling page breaks
    const totalYmm=p.r*rowUnitMm;
    const rowsPerPage=Math.floor(contentH/rowUnitMm);
    const pageNum=Math.floor(p.r/rowsPerPage);
    const rowOnPage=p.r%rowsPerPage;

    // ensure correct page
    while(doc.internal.getCurrentPageInfo().pageNumber-1<pageNum) doc.addPage();
    // set page
    doc.setPage(pageNum+1);

    const px=marginL+p.c*(colW+colGap);
    const py=y+rowOnPage*rowUnitMm;

    // step number top-left
    doc.setFont('helvetica','bold');
    doc.setFontSize(8);
    doc.setTextColor(80,80,80);
    doc.text(String(i+1),px+1.5,py+4);

    // icon
    const imgData=iconPngs[i];
    if(imgData){
      doc.addImage(imgData,'PNG',px+2,py+2,sw-4,sh-4);
    }
  });

  // footer
  doc.setFont('helvetica','italic');
  doc.setFontSize(8);
  doc.setTextColor(180,180,180);
  doc.text('Made by scouts for scouts',pageW/2,pageH-8,{align:'center'});

  const slug=(title.replace(/[^a-z0-9]/gi,'_').toLowerCase()||'route');
  doc.save(`${slug}.pdf`);

function signSvg(id,sz,opts){

      if(end)out+=`<line x1="${cx-rr*0.9}" y1="${cy+rr*0.9}" x2="${cx+rr*0.9}" y2="${cy-rr*0.9}" stroke="#888" stroke-width="${lw*1.1}"/>`;
    } else {
      out+=`<circle cx="${cx}" cy="${cy}" r="${r}" fill="${WH}" stroke="${end?'#888':RED}" stroke-width="${lw*1.6}"/>`;
      out+=`<text x="${cx}" y="${cy+fs*0.36}" text-anchor="middle" font-size="${fs}" font-family="DM Sans,sans-serif" font-weight="700" fill="${end?'#888':BK}">${speed}</text>`;
      if(end)out+=`<line x1="${cx-r*0.78}" y1="${cy+r*0.78}" x2="${cx+r*0.78}" y2="${cy-r*0.78}" stroke="#888" stroke-width="${lw*1.4}"/>`;

  else if(s.type==='closed'){

  else if(s.shape==='diamond-x'){
    out+=`<polygon points="${cx},${m} ${sz-m},${cy} ${cx},${sz-m} ${m},${cy}" fill="${YEL}" stroke="${BK}" stroke-width="${lw}"/>`;
    out+=`<polygon points="${cx},${m*2.2} ${sz-m*2.2},${cy} ${cx},${sz-m*2.2} ${m*2.2},${cy}" fill="${WH}"/>`;
    out+=`<polygon points="${cx},${m*3} ${sz-m*3},${cy} ${cx},${sz-m*3} ${m*3},${cy}" fill="${YEL}"/>`;
    out+=`<line x1="${m*1.6}" y1="${cy}" x2="${sz-m*1.6}" y2="${cy}" stroke="#888" stroke-width="${lw}"/>`;
  }
  else if(s.shape==='priority-cross'){
    out+=`<polygon points="${cx},${m} ${sz-m},${cy} ${cx},${sz-m} ${m},${cy}" fill="${WH}" stroke="${BK}" stroke-width="${lw}"/>`;
    // vertical priority road (thick)
    out+=`<rect x="${cx-sz*0.05}" y="${cy-r*0.7}" width="${sz*0.1}" height="${r*1.4}" fill="${BK}"/>`;
    // horizontal crossing road (thin), per direction
    const hw2=sz*0.035;
    if(s.dir==='both'||s.dir==='left') out+=`<rect x="${cx-r*0.7}" y="${cy-hw2}" width="${r*0.7}" height="${hw2*2}" fill="${BK}"/>`;
    if(s.dir==='both'||s.dir==='right') out+=`<rect x="${cx}" y="${cy-hw2}" width="${r*0.7}" height="${hw2*2}" fill="${BK}"/>`;
  }
  else if(s.shape==='tri-inv'){
    out+=`<polygon points="${m},${m*1.4} ${sz-m},${m*1.4} ${cx},${sz-m}" fill="${WH}" stroke="${RED}" stroke-width="${lw*1.6}"/>`;
  }
  else if(s.shape==='octagon'){
    const a=r*0.42;
    out+=`<polygon points="${cx-a},${m} ${cx+a},${m} ${sz-m},${cy-a} ${sz-m},${cy+a} ${cx+a},${sz-m} ${cx-a},${sz-m} ${m},${cy+a} ${m},${cy-a}" fill="${RED}" stroke="${BK}" stroke-width="${lw}"/>`;
    out+=`<text x="${cx}" y="${cy+sz*0.1}" text-anchor="middle" font-size="${sz*0.24}" font-family="DM Sans,sans-serif" font-weight="900" fill="${WH}">STOP</text>`;
  }
  else if(s.shape==='noentry'){
    out+=`<circle cx="${cx}" cy="${cy}" r="${r}" fill="${RED}" stroke="${BK}" stroke-width="${lw}"/>`;
    out+=`<rect x="${cx-r*0.55}" y="${cy-sz*0.07}" width="${r*1.1}" height="${sz*0.14}" fill="${WH}"/>`;
  }
  else if(s.shape==='oneway'){
    out+=`<rect x="${m}" y="${m}" width="${sz-m*2}" height="${sz-m*2}" rx="${sz*0.06}" fill="${BLUE}" stroke="${BK}" stroke-width="${lw*0.7}"/>`;
    const ar=sz*0.3;
    let ang=0;
    if(s.dir==='up')ang=0;else if(s.dir==='left')ang=270;else if(s.dir==='right')ang=90;
    const rad=ang*Math.PI/180,dx=Math.sin(rad),dy=-Math.cos(rad),px=Math.cos(rad),py=Math.sin(rad);
    const tx=cx+dx*ar,ty=cy+dy*ar,bx=cx-dx*ar,by=cy-dy*ar;
    const hl=sz*0.14,hw3=sz*0.1;
    out+=`<line x1="${bx}" y1="${by}" x2="${tx}" y2="${ty}" stroke="${WH}" stroke-width="${sz*0.07}" stroke-linecap="round"/>`;
    const abx=tx-dx*hl,aby=ty-dy*hl;
    out+=`<polygon points="${tx},${ty} ${abx+px*hw3},${aby+py*hw3} ${abx-px*hw3},${aby-py*hw3}" fill="${WH}"/>`;
  }
  // ── D-serie ──
  else if(s.shape==='mandatory'){
    out+=`<circle cx="${cx}" cy="${cy}" r="${r}" fill="${BLUE}" stroke="${BK}" stroke-width="${lw}"/>`;
    const ar=r*0.62;
    let ang=0;
    if(s.dir==='up')ang=0;else if(s.dir==='left')ang=270;else if(s.dir==='right')ang=90;
    const rad=ang*Math.PI/180,dx=Math.sin(rad),dy=-Math.cos(rad),px=Math.cos(rad),py=Math.sin(rad);
    const tx=cx+dx*ar,ty=cy+dy*ar,bx=cx-dx*ar,by=cy-dy*ar;
    const hl=sz*0.16,hw3=sz*0.11;
    out+=`<line x1="${bx}" y1="${by}" x2="${tx}" y2="${ty}" stroke="${WH}" stroke-width="${sz*0.08}" stroke-linecap="round"/>`;
    const abx=tx-dx*hl,aby=ty-dy*hl;
    out+=`<polygon points="${tx},${ty} ${abx+px*hw3},${aby+py*hw3} ${abx-px*hw3},${aby-py*hw3}" fill="${WH}"/>`;
  }
  else if(s.shape==='roundabout'){
    out+=`<circle cx="${cx}" cy="${cy}" r="${r}" fill="${BLUE}" stroke="${BK}" stroke-width="${lw}"/>`;
    const rr=r*0.5;
    // three curved arrows in a ring
    for(let i=0;i<3;i++){
      const a0=i*120*Math.PI/180, a1=a0+70*Math.PI/180;
      const x0=cx+Math.sin(a0)*rr, y0=cy-Math.cos(a0)*rr;
      const x1=cx+Math.sin(a1)*rr, y1=cy-Math.cos(a1)*rr;
      out+=`<path d="M${x0.toFixed(1)},${y0.toFixed(1)} A${rr},${rr} 0 0 1 ${x1.toFixed(1)},${y1.toFixed(1)}" fill="none" stroke="${WH}" stroke-width="${sz*0.05}" stroke-linecap="round"/>`;
      // arrowhead at end
      const ta=a1+8*Math.PI/180;
      const hx=cx+Math.sin(ta)*rr, hy=cy-Math.cos(ta)*rr;
      const tang=a1+90*Math.PI/180;
      const hl=sz*0.06;
      out+=`<polygon points="${hx},${hy} ${(x1-Math.sin(tang)*hl+Math.cos(a1)*hl*0.5).toFixed(1)},${(y1+Math.cos(tang)*hl+Math.sin(a1)*hl*0.5).toFixed(1)} ${(x1).toFixed(1)},${(y1).toFixed(1)}" fill="${WH}"/>`;
    }
  }
  // ── E-serie (parkeren) ──
  else if(s.shape==='noparking'||s.shape==='noparking-zone'){
    const zone=s.shape.includes('zone');
    out+=`<circle cx="${cx}" cy="${cy}" r="${r}" fill="${BLUE}" stroke="${RED}" stroke-width="${lw*1.4}"/>`;
    out+=`<text x="${cx}" y="${cy+sz*0.13}" text-anchor="middle" font-size="${sz*0.42}" font-family="DM Sans,sans-serif" font-weight="700" fill="${WH}">P</text>`;
    out+=`<line x1="${cx-r*0.7}" y1="${cy+r*0.7}" x2="${cx+r*0.7}" y2="${cy-r*0.7}" stroke="${RED}" stroke-width="${lw*1.4}"/>`;
    if(zone)out+=`<text x="${cx}" y="${cy-r*0.55}" text-anchor="middle" font-size="${sz*0.14}" font-family="DM Sans,sans-serif" font-weight="700" fill="${WH}">zone</text>`;
  }
  else if(s.shape==='nostopping'||s.shape==='nostopping-zone'){
    const zone=s.shape.includes('zone');
    out+=`<circle cx="${cx}" cy="${cy}" r="${r}" fill="${BLUE}" stroke="${RED}" stroke-width="${lw*1.4}"/>`;
    // X cross (two red lines)
    out+=`<line x1="${cx-r*0.65}" y1="${cy-r*0.65}" x2="${cx+r*0.65}" y2="${cy+r*0.65}" stroke="${RED}" stroke-width="${lw*1.4}"/>`;
    out+=`<line x1="${cx+r*0.65}" y1="${cy-r*0.65}" x2="${cx-r*0.65}" y2="${cy+r*0.65}" stroke="${RED}" stroke-width="${lw*1.4}"/>`;
    if(zone)out+=`<text x="${cx}" y="${cy+sz*0.05}" text-anchor="middle" font-size="${sz*0.14}" font-family="DM Sans,sans-serif" font-weight="700" fill="${WH}">zone</text>`;
  }
  else if(s.shape==='parking'){
    out+=`<rect x="${m}" y="${m}" width="${sz-m*2}" height="${sz-m*2}" rx="${sz*0.06}" fill="${BLUE}" stroke="${BK}" stroke-width="${lw*0.7}"/>`;
    out+=`<text x="${cx}" y="${cy+sz*0.16}" text-anchor="middle" font-size="${sz*0.5}" font-family="DM Sans,sans-serif" font-weight="700" fill="${WH}">P</text>`;
  }
  // ── F-serie ──
  else if(s.shape==='noovertake'){
    out+=`<circle cx="${cx}" cy="${cy}" r="${r}" fill="${WH}" stroke="${RED}" stroke-width="${lw*1.4}"/>`;
    // two cars side by side: left red, right black
    out+=`<g transform="translate(${cx-r*0.32},${cy}) scale(0.55)">${vehiclePath('auto',0,0,sz*0.5,RED)}</g>`;
    out+=`<g transform="translate(${cx+r*0.32},${cy}) scale(0.55)">${vehiclePath('auto',0,0,sz*0.5,BK)}</g>`;
  }
  else if(s.shape==='oncoming-yield'){
    // red arrow down (you yield), black arrow up
    out+=`<circle cx="${cx}" cy="${cy}" r="${r}" fill="${WH}" stroke="${RED}" stroke-width="${lw*1.4}"/>`;
    const ah=r*0.6;
    out+=`<line x1="${cx-r*0.28}" y1="${cy-ah}" x2="${cx-r*0.28}" y2="${cy+ah}" stroke="${RED}" stroke-width="${sz*0.06}" stroke-linecap="round"/>`;
    out+=`<polygon points="${cx-r*0.28},${cy+ah} ${cx-r*0.28-sz*0.06},${cy+ah-sz*0.1} ${cx-r*0.28+sz*0.06},${cy+ah-sz*0.1}" fill="${RED}"/>`;
    out+=`<line x1="${cx+r*0.28}" y1="${cy+ah}" x2="${cx+r*0.28}" y2="${cy-ah}" stroke="${BK}" stroke-width="${sz*0.06}" stroke-linecap="round"/>`;
    out+=`<polygon points="${cx+r*0.28},${cy-ah} ${cx+r*0.28-sz*0.06},${cy-ah+sz*0.1} ${cx+r*0.28+sz*0.06},${cy-ah+sz*0.1}" fill="${BK}"/>`;
  }
  else if(s.shape==='oncoming-priority'){
    // blue square, black arrow up (priority) + red arrow down (oncoming waits)
    out+=`<rect x="${m}" y="${m}" width="${sz-m*2}" height="${sz-m*2}" rx="${sz*0.06}" fill="${BLUE}" stroke="${BK}" stroke-width="${lw*0.7}"/>`;
    const ah=r*0.6;
    out+=`<line x1="${cx-r*0.28}" y1="${cy+ah}" x2="${cx-r*0.28}" y2="${cy-ah}" stroke="${WH}" stroke-width="${sz*0.06}" stroke-linecap="round"/>`;
    out+=`<polygon points="${cx-r*0.28},${cy-ah} ${cx-r*0.28-sz*0.06},${cy-ah+sz*0.1} ${cx-r*0.28+sz*0.06},${cy-ah+sz*0.1}" fill="${WH}"/>`;
    out+=`<line x1="${cx+r*0.28}" y1="${cy-ah}" x2="${cx+r*0.28}" y2="${cy+ah}" stroke="${RED}" stroke-width="${sz*0.06}" stroke-linecap="round"/>`;
    out+=`<polygon points="${cx+r*0.28},${cy+ah} ${cx+r*0.28-sz*0.06},${cy+ah-sz*0.1} ${cx+r*0.28+sz*0.06},${cy+ah-sz*0.1}" fill="${RED}"/>`;
  }
  // ── H-serie place name ──
  else if(s.type==='place'){
    const txt=opts.place||'Plaats';
    const fs=sz*0.18;
    out+=`<rect x="${m*0.5}" y="${cy-sz*0.18}" width="${sz-m}" height="${sz*0.36}" rx="${sz*0.03}" fill="${BLUE}" stroke="${BK}" stroke-width="${lw*0.7}"/>`;
    out+=`<text x="${cx}" y="${cy+fs*0.36}" text-anchor="middle" font-size="${fs}" font-family="DM Sans,sans-serif" font-weight="700" fill="${WH}">${txt}</text>`;
  }
  // ── N-serie street name ──
  else if(s.type==='streetname'){
    const txt=opts.street||'Straat';
    const fs=sz*0.15;
    out+=`<rect x="${m*0.4}" y="${cy-sz*0.16}" width="${sz-m*0.8}" height="${sz*0.32}" rx="${sz*0.04}" fill="${BLUE}" stroke="${WH}" stroke-width="${lw*0.6}"/>`;
    out+=`<text x="${cx}" y="${cy+fs*0.36}" text-anchor="middle" font-size="${fs}" font-family="DM Sans,sans-serif" font-weight="700" fill="${WH}">${txt}</text>`;
  }
  // ── G-serie woonerf ──
  else if(s.shape==='woonerf'){
    out+=`<rect x="${m}" y="${m}" width="${sz-m*2}" height="${sz-m*2}" rx="${sz*0.06}" fill="${BLUE}" stroke="${BK}" stroke-width="${lw*0.7}"/>`;
    out+=`<g transform="translate(${cx-sz*0.18},${cy+sz*0.05}) scale(0.4)">${vehiclePath('voet',0,0,sz*0.5,WH)}</g>`;
    out+=`<g transform="translate(${cx+sz*0.12},${cy+sz*0.12}) scale(0.32)">${vehiclePath('auto',0,0,sz*0.5,WH)}</g>`;
    out+=`<circle cx="${cx+sz*0.16}" cy="${cy-sz*0.16}" r="${sz*0.05}" fill="${WH}"/>`;
  }
  // ── G-serie path (voet/fiets/ruiter) ──
  else if(s.shape==='path'){
    out+=`<circle cx="${cx}" cy="${cy}" r="${r}" fill="${BLUE}" stroke="${BK}" stroke-width="${lw}"/>`;
    out+=signGlyph(s.glyph,cx,cy,sz*0.5,WH);
  }
  else if(s.shape==='path-zone'){
    // rectangular blue zone sign with the round path sign inside + "zone"
    out+=`<rect x="${m*0.6}" y="${m*0.6}" width="${sz-m*1.2}" height="${sz-m*1.2}" rx="${sz*0.06}" fill="${BLUE}" stroke="${BK}" stroke-width="${lw*0.7}"/>`;
    // inner white circle with glyph
    const ir=r*0.52;
    out+=`<circle cx="${cx}" cy="${cy-sz*0.08}" r="${ir}" fill="${WH}"/>`;
    out+=signGlyph(s.glyph,cx,cy-sz*0.08,ir*1.4,BLUE);
    out+=`<text x="${cx}" y="${cy+r*0.78}" text-anchor="middle" font-size="${sz*0.15}" font-family="DM Sans,sans-serif" font-weight="700" fill="${WH}">zone</text>`;
  }
  // ── J-serie warning (yellow triangle with glyph) ──
  else if(s.shape==='warn'){
    out+=`<polygon points="${cx},${m} ${sz-m},${sz-m} ${m},${sz-m}" fill="${YEL}" stroke="${BK}" stroke-width="${lw}"/>`;
    out+=signGlyph(s.glyph,cx,cy+sz*0.08,sz*0.4,BK);
  }
  // ── L-serie info blue square with glyph ──
  else if(s.shape==='info-blue'){
    out+=`<rect x="${m}" y="${m}" width="${sz-m*2}" height="${sz-m*2}" rx="${sz*0.06}" fill="${BLUE}" stroke="${BK}" stroke-width="${lw*0.7}"/>`;
    out+=signGlyph(s.glyph,cx,cy,sz*0.55,WH);
  }
  // ── L-serie border (Europees grensbord) ──
  else if(s.shape==='border'){
    const txt=opts.border||'';
    // blue rectangular sign
    out+=`<rect x="${m*0.5}" y="${m*0.5}" width="${sz-m}" height="${sz-m}" rx="${sz*0.05}" fill="${BLUE}" stroke="${BK}" stroke-width="${lw*0.6}"/>`;
    // ring of 12 yellow stars
    const starR=r*0.5, scx=cx, scy=cy-(txt?sz*0.08:0);
    for(let i=0;i<12;i++){
      const a=i*30*Math.PI/180;
      const sx=scx+Math.sin(a)*starR, sy=scy-Math.cos(a)*starR;
      out+=drawStar(sx,sy,sz*0.05,'#F5C800');
    }
    if(txt)out+=`<text x="${cx}" y="${cy+r*0.74}" text-anchor="middle" font-size="${sz*0.16}" font-family="DM Sans,sans-serif" font-weight="700" fill="${WH}">${txt}</text>`;
  }
  return`<svg width="${sz}" height="${sz}" viewBox="0 0 ${sz} ${sz}" fill="none" xmlns="http://www.w3.org/2000/svg">${out}</svg>`;
}

// 5-point star centered at cx,cy
function drawStar(cx,cy,r,col){
  let pts=[];
  for(let i=0;i<10;i++){
    const rad=i%2===0?r:r*0.4;
    const a=(i*36-90)*Math.PI/180;
    pts.push(`${(cx+Math.cos(a)*rad).toFixed(1)},${(cy+Math.sin(a)*rad).toFixed(1)}`);
  }
  return`<polygon points="${pts.join(' ')}" fill="${col}"/>`;
}

// Glyph helper for sign symbols
function signGlyph(g,cx,cy,sc,col){
  const s=sc/100;
  if(g==='voet')return vehiclePath('voet',cx,cy,sc,col);
  if(g==='fiets')return vehiclePath('fiets',cx,cy,sc,col);
  if(g==='paard'){
    return `<g transform="translate(${cx},${cy}) scale(${s}) translate(-50,-50)"><path d="M30 70 L35 45 Q38 35 50 35 L62 38 Q70 40 72 32 L76 36 Q74 48 62 48 L55 47 L52 58 L60 72 L52 72 L46 60 L42 72 L34 72 Z" fill="${col}"/></g>`;
  }
  if(g==='bump')return `<path d="M${cx-sc*0.4} ${cy+sc*0.15} Q${cx} ${cy-sc*0.3} ${cx+sc*0.4} ${cy+sc*0.15}" fill="none" stroke="${col}" stroke-width="${sc*0.1}" stroke-linecap="round"/>`;
  if(g==='cross')return `<rect x="${cx-sc*0.06}" y="${cy-sc*0.4}" width="${sc*0.12}" height="${sc*0.8}" fill="${col}"/><rect x="${cx-sc*0.4}" y="${cy-sc*0.06}" width="${sc*0.8}" height="${sc*0.12}" fill="${col}"/>`;
  if(g==='round'){
    let o='';for(let i=0;i<3;i++){const a0=i*120*Math.PI/180,a1=a0+70*Math.PI/180,rr=sc*0.32;const x0=cx+Math.sin(a0)*rr,y0=cy-Math.cos(a0)*rr,x1=cx+Math.sin(a1)*rr,y1=cy-Math.cos(a1)*rr;o+=`<path d="M${x0.toFixed(1)},${y0.toFixed(1)} A${rr},${rr} 0 0 1 ${x1.toFixed(1)},${y1.toFixed(1)}" fill="none" stroke="${col}" stroke-width="${sc*0.08}" stroke-linecap="round"/>`;}return o;
  }
  if(g==='bridge')return `<rect x="${cx-sc*0.35}" y="${cy-sc*0.3}" width="${sc*0.1}" height="${sc*0.5}" fill="${col}"/><rect x="${cx+sc*0.25}" y="${cy-sc*0.3}" width="${sc*0.1}" height="${sc*0.5}" fill="${col}"/><path d="M${cx-sc*0.3} ${cy-sc*0.25} Q${cx} ${cy-sc*0.05} ${cx+sc*0.3} ${cy-sc*0.25}" fill="none" stroke="${col}" stroke-width="${sc*0.07}"/>`;
  if(g==='stones')return `<circle cx="${cx-sc*0.2}" cy="${cy+sc*0.1}" r="${sc*0.1}" fill="${col}"/><circle cx="${cx+sc*0.15}" cy="${cy+sc*0.18}" r="${sc*0.08}" fill="${col}"/><circle cx="${cx+sc*0.05}" cy="${cy-sc*0.05}" r="${sc*0.07}" fill="${col}"/><path d="M${cx-sc*0.35} ${cy-sc*0.25} L${cx+sc*0.1} ${cy-sc*0.3}" stroke="${col}" stroke-width="${sc*0.05}" stroke-linecap="round"/>`;
  if(g==='excl')return `<rect x="${cx-sc*0.06}" y="${cy-sc*0.35}" width="${sc*0.12}" height="${sc*0.45}" rx="${sc*0.05}" fill="${col}"/><circle cx="${cx}" cy="${cy+sc*0.28}" r="${sc*0.08}" fill="${col}"/>`;
  if(g==='zebra'){
    let o='';for(let i=0;i<4;i++)o+=`<rect x="${cx-sc*0.35+i*sc*0.2}" y="${cy-sc*0.35}" width="${sc*0.1}" height="${sc*0.7}" fill="${col}"/>`;return o;
  }
  if(g==='deadend')return `<rect x="${cx-sc*0.08}" y="${cy}" width="${sc*0.16}" height="${sc*0.4}" fill="${col}"/><rect x="${cx-sc*0.3}" y="${cy-sc*0.4}" width="${sc*0.6}" height="${sc*0.16}" fill="#E8290B"/>`;
  if(g==='deadend-l')return `<rect x="${cx-sc*0.08}" y="${cy-sc*0.1}" width="${sc*0.16}" height="${sc*0.5}" fill="${col}"/><rect x="${cx-sc*0.4}" y="${cy-sc*0.25}" width="${sc*0.32}" height="${sc*0.16}" fill="#E8290B"/>`;
  if(g==='deadend-r')return `<rect x="${cx-sc*0.08}" y="${cy-sc*0.1}" width="${sc*0.16}" height="${sc*0.5}" fill="${col}"/><rect x="${cx+sc*0.08}" y="${cy-sc*0.25}" width="${sc*0.32}" height="${sc*0.16}" fill="#E8290B"/>`;
  if(g==='fietsstraat')return vehiclePath('fiets',cx,cy-sc*0.05,sc*0.8,col);
  if(g==='wandelstraat')return vehiclePath('voet',cx,cy-sc*0.05,sc*0.8,col);
  return'';
}

let _signDDopen=false;
function toggleSignDD(e){
  e.stopPropagation();
  _signDDopen=!_signDDopen;
  renderD();
}
function setSign(id){
  if(sel===null)return;
  steps[sel].junc_sign=id||null;
  // reset config defaults
  const s=SIGNS.find(x=>x.id===id);
  if(s&&(s.type==='speed'||s.type==='speed-zone'||s.type==='speed-end'||s.type==='speed-zone-end')){
    if(!steps[sel].junc_sign_speed)steps[sel].junc_sign_speed='50';
  }
  if(s&&s.type==='closed'){
    if(!steps[sel].junc_sign_vehicle)steps[sel].junc_sign_vehicle='auto';
  }
  _signDDopen=false;
  renderD();render();
}
function setSignSpeed(v){if(sel===null)return;steps[sel].junc_sign_speed=v.replace(/\D/g,'')||'';render();}
function setSignVehicle(v){if(sel===null)return;steps[sel].junc_sign_vehicle=v;renderD();}
function setSignPlace(v){if(sel===null)return;steps[sel].junc_sign_place=v;render();}
function setSignStreet(v){if(sel===null)return;steps[sel].junc_sign_street=v;render();}
function setSignBorder(v){if(sel===null)return;steps[sel].junc_sign_border=v;render();}
function signOpts(s){return{speed:s.junc_sign_speed||'50',vehicle:s.junc_sign_vehicle||'auto',place:s.junc_sign_place||'Plaats',street:s.junc_sign_street||'Straat',border:s.junc_sign_border||'Grens'};}
function addSignToStreet(){
  if(sel===null)return;
  const s=steps[sel];
  if(!s.junc_sign)return;
  const lbl=document.getElementById('sign-street-sel')?.value;
  if(!lbl)return;
  const sign={id:s.junc_sign,opts:signOpts(s)};
  // parse label like "1" or "1A"
  const m=lbl.match(/^(\d+)([A-Z]?)$/);
  if(!m)return;
  const si=parseInt(m[1])-1;
  if(m[2]){
    const ci=m[2].charCodeAt(0)-65;
    const ch=s.junc_streets[si]?.children?.[ci];
    if(ch){if(!ch.signs)ch.signs=[];ch.signs.push(sign);}
  } else {
    const st=s.junc_streets[si];
    if(st){if(!st.signs)st.signs=[];st.signs.push(sign);}
  }
  render();renderD();
}
function removeSignFromStreet(si,ci,k){
  if(sel===null)return;
  const s=steps[sel];
  if(ci===null){
    s.junc_streets[si].signs.splice(k,1);
  } else {

  }
  render();renderD();
}

function juncSvg(streets,sz){
  const cx=sz/2,cy=sz/2;
  const roadLen=sz*0.44;
  const hw=sz*0.085;
  const lw=Math.max(0.8,sz*0.022);
  const col='#1a1a1a';
  const allAngles=[180,...streets.map(s=>s.angle)];
  const sorted=[...allAngles].sort((a,b)=>((a%360+360)%360)-((b%360+360)%360));
  const n=sorted.length;
  function r2v(a){const r=a*Math.PI/180;return{dx:Math.sin(r),dy:-Math.cos(r),px:Math.cos(r),py:Math.sin(r)};}
  function edgeOuter(a,side){const v=r2v(a),s=side==='L'?1:-1;return{x:cx+v.dx*roadLen+v.px*hw*s,y:cy+v.dy*roadLen+v.py*hw*s};}
  function edgeLine(a,side){const v=r2v(a),s=side==='L'?1:-1;return{p:{x:cx+v.px*hw*s,y:cy+v.py*hw*s},d:{x:v.dx,y:v.dy}};}
  function lineIntersect(l1,l2){const cross=l1.d.x*l2.d.y-l1.d.y*l2.d.x;if(Math.abs(cross)<1e-9)return null;const t=((l2.p.x-l1.p.x)*l2.d.y-(l2.p.y-l1.p.y)*l2.d.x)/cross;return{x:l1.p.x+t*l1.d.x,y:l1.p.y+t*l1.d.y};}
  const innerL=new Array(n),innerR=new Array(n);
  for(let i=0;i<n;i++){const prev=(i-1+n)%n,next=(i+1)%n;const lL=edgeLine(sorted[i],'L');const lPR=edgeLine(sorted[prev],'R');const lR=edgeLine(sorted[i],'R');const lNL=edgeLine(sorted[next],'L');innerL[i]=lineIntersect(lL,lPR)||lL.p;innerR[i]=lineIntersect(lR,lNL)||lR.p;}
  let out='';
  for(let i=0;i<n;i++){const OL=edgeOuter(sorted[i],'L'),OR=edgeOuter(sorted[i],'R');const IL=innerL[i],IR=innerR[i];out+=`<line x1="${IL.x.toFixed(2)}" y1="${IL.y.toFixed(2)}" x2="${OL.x.toFixed(2)}" y2="${OL.y.toFixed(2)}" stroke="${col}" stroke-width="${lw}" stroke-linecap="square"/>`;out+=`<line x1="${IR.x.toFixed(2)}" y1="${IR.y.toFixed(2)}" x2="${OR.x.toFixed(2)}" y2="${OR.y.toFixed(2)}" stroke="${col}" stroke-width="${lw}" stroke-linecap="square"/>`;out+=`<line x1="${OL.x.toFixed(2)}" y1="${OL.y.toFixed(2)}" x2="${OR.x.toFixed(2)}" y2="${OR.y.toFixed(2)}" stroke="${col}" stroke-width="${lw}" stroke-linecap="round"/>`;}
  for(let i=0;i<n;i++){const p1=innerR[i],p2=innerL[(i+1)%n];const angDiff=((sorted[(i+1)%n]-sorted[i])+360)%360;if(angDiff<=180){out+=`<line x1="${p1.x.toFixed(2)}" y1="${p1.y.toFixed(2)}" x2="${p2.x.toFixed(2)}" y2="${p2.y.toFixed(2)}" stroke="${col}" stroke-width="${lw}" stroke-linecap="round"/>`;}else{const mx=(p1.x+p2.x)/2,my=(p1.y+p2.y)/2;const cdx=mx-cx,cdy=my-cy;const cLen=Math.hypot(cdx,cdy)||1;const pull=hw*0.5;const qx=mx+cdx/cLen*pull,qy=my+cdy/cLen*pull;out+=`<path d="M${p1.x.toFixed(2)},${p1.y.toFixed(2)} Q${qx.toFixed(2)},${qy.toFixed(2)} ${p2.x.toFixed(2)},${p2.y.toFixed(2)}" fill="none" stroke="${col}" stroke-width="${lw}"/>`;}}
  out+=`<circle cx="${cx.toFixed(1)}" cy="${(cy+roadLen).toFixed(1)}" r="${(sz*0.045).toFixed(1)}" fill="${col}"/>`;
  streets.forEach(st=>{if(!st.isArrow)return;const r=st.angle*Math.PI/180,as=sz*0.05,ae=roadLen*0.72;const ax1=cx+Math.sin(r)*as,ay1=cy-Math.cos(r)*as;const ax2=cx+Math.sin(r)*ae,ay2=cy-Math.cos(r)*ae;const hl=sz*0.10,hw2=sz*0.065;const abx=ax2-Math.sin(r)*hl,aby=ay2+Math.cos(r)*hl;const w1x=abx+Math.cos(r)*hw2,w1y=aby+Math.sin(r)*hw2;const w2x=abx-Math.cos(r)*hw2,w2y=aby-Math.sin(r)*hw2;out+=`<line x1="${ax1.toFixed(1)}" y1="${ay1.toFixed(1)}" x2="${abx.toFixed(1)}" y2="${aby.toFixed(1)}" stroke="#378ADD" stroke-width="${(sz*0.025).toFixed(1)}" stroke-linecap="round"/>`;out+=`<polygon points="${ax2.toFixed(1)},${ay2.toFixed(1)} ${w1x.toFixed(1)},${w1y.toFixed(1)} ${w2x.toFixed(1)},${w2y.toFixed(1)}" fill="#378ADD"/>`;});
  return`<svg width="${sz}" height="${sz}" viewBox="0 0 ${sz} ${sz}" fill="none" xmlns="http://www.w3.org/2000/svg">${out}</svg>`;
}

function juncSvgCard(streets, sz) {
  const cx=sz/2,cy=sz/2,Lm=sz*0.35,Lc=sz*0.22,hw=sz*0.09,lw=Math.max(1,sz*0.022),col='#1a1a1a';
  function edge(a,side,ocx,ocy){const r=a*Math.PI/180,s=side==='L'?1:-1;return{ox:ocx+(-Math.cos(r))*hw*s,oy:ocy+(-Math.sin(r))*hw*s,dx:Math.sin(r),dy:-Math.cos(r)};}
  function isect(e1,e2){const c=e1.dx*e2.dy-e1.dy*e2.dx;if(Math.abs(c)<1e-9)return null;const t=((e2.ox-e1.ox)*e2.dy-(e2.oy-e1.oy)*e2.dx)/c;return{x:e1.ox+t*e1.dx,y:e1.oy+t*e1.dy};}
  function drawJ(roads,ocx,ocy,L){
    const sorted=[...roads].sort((a,b)=>((a.angle+360)%360)-((b.angle+360)%360));
    const n=sorted.length;let out='';
    for(let i=0;i<n;i++){
      const prev=(i-1+n)%n,next=(i+1)%n;
      const a=sorted[i].angle,r=a*Math.PI/180,dx=Math.sin(r),dy=-Math.cos(r),px=Math.cos(r),py=Math.sin(r);
      const eL=edge(a,'L',ocx,ocy),eR=edge(a,'R',ocx,ocy);
      const sL=isect(eL,edge(sorted[prev].angle,'R',ocx,ocy))||{x:eL.ox,y:eL.oy};
      const sR=isect(eR,edge(sorted[next].angle,'L',ocx,ocy))||{x:eR.ox,y:eR.oy};
      const tL={x:eL.ox+dx*L,y:eL.oy+dy*L},tR={x:eR.ox+dx*L,y:eR.oy+dy*L};
      out+=`<line x1="${sL.x.toFixed(2)}" y1="${sL.y.toFixed(2)}" x2="${tL.x.toFixed(2)}" y2="${tL.y.toFixed(2)}" stroke="${col}" stroke-width="${lw}" stroke-linecap="butt"/>`;
      out+=`<line x1="${sR.x.toFixed(2)}" y1="${sR.y.toFixed(2)}" x2="${tR.x.toFixed(2)}" y2="${tR.y.toFixed(2)}" stroke="${col}" stroke-width="${lw}" stroke-linecap="butt"/>`;
      if(sorted[i].isArrow){const ae=L*0.8,hl=sz*0.07,hw2=sz*0.05;const ax1=ocx+dx*sz*0.03,ay1=ocy+dy*sz*0.03,ax2=ocx+dx*ae,ay2=ocy+dy*ae,abx=ocx+dx*(ae-hl),aby=ocy+dy*(ae-hl);out+=`<line x1="${ax1.toFixed(1)}" y1="${ay1.toFixed(1)}" x2="${abx.toFixed(1)}" y2="${aby.toFixed(1)}" stroke="#378ADD" stroke-width="${(sz*0.022).toFixed(1)}" stroke-linecap="round"/>`;out+=`<polygon points="${ax2.toFixed(1)},${ay2.toFixed(1)} ${(abx+px*hw2).toFixed(1)},${(aby+py*hw2).toFixed(1)} ${(abx-px*hw2).toFixed(1)},${(aby-py*hw2).toFixed(1)}" fill="#378ADD"/>`;}
    }
    return out;
  }
  const mainRoads=[{angle:180,isArrow:false},...streets.map(s=>({angle:s.angle,isArrow:s.isArrow&&!(s.children&&s.children.length)}))];
  let out=drawJ(mainRoads,cx,cy,Lm);
  out+=`<circle cx="${cx}" cy="${(cy+Lm).toFixed(1)}" r="${(sz*0.04).toFixed(1)}" fill="${col}"/>`;
  streets.forEach(st=>{
    if(!st.children||!st.children.length)return;
    const r0=st.angle*Math.PI/180,ox=cx+Math.sin(r0)*Lm,oy=cy-Math.cos(r0)*Lm;
    out+=drawJ([{angle:(st.angle+180)%360,isArrow:false},...st.children],ox,oy,Lc);
  });
  // Track extreme points for bounding box (start with base road dot)
  const pts=[{x:cx,y:cy+Lm},{x:cx,y:cy}];
  // Draw signs near street tips
  const signSz=sz*0.26;
  streets.forEach((st,i)=>{
    const r0=st.angle*Math.PI/180;
    const tipx=cx+Math.sin(r0)*Lm,tipy=cy-Math.cos(r0)*Lm;
    pts.push({x:tipx,y:tipy});
    (st.signs||[]).forEach((sgn,k)=>{
      const px=Math.cos(r0),py=Math.sin(r0);
      const off=signSz*(k+0.5);
      const scx=tipx+px*off, scy=tipy+py*off;
      const sx=scx-signSz/2, sy=scy-signSz/2;
      const inner=signSvg(sgn.id,signSz,sgn.opts||{}).replace(/<\/?svg[^>]*>/g,'');
      out+=`<g transform="translate(${sx.toFixed(1)},${sy.toFixed(1)})">${inner}</g>`;
      // sign corners
      pts.push({x:sx,y:sy},{x:sx+signSz,y:sy+signSz});
    });
    (st.children||[]).forEach(ch=>{
      const rc=ch.angle*Math.PI/180;
      const ox=cx+Math.sin(r0)*Lm,oy=cy-Math.cos(r0)*Lm;
      const ctipx=ox+Math.sin(rc)*Lc, ctipy=oy-Math.cos(rc)*Lc;
      pts.push({x:ctipx,y:ctipy});
      (ch.signs||[]).forEach((sgn,k)=>{
        const px=Math.cos(rc),py=Math.sin(rc);
        const off=signSz*(k+0.5);
        const scx=ctipx+px*off, scy=ctipy+py*off;
        const sx=scx-signSz/2, sy=scy-signSz/2;
        const inner=signSvg(sgn.id,signSz,sgn.opts||{}).replace(/<\/?svg[^>]*>/g,'');
        out+=`<g transform="translate(${sx.toFixed(1)},${sy.toFixed(1)})">${inner}</g>`;
        pts.push({x:sx,y:sy},{x:sx+signSz,y:sy+signSz});
      });
    });
  });
  // Compute bounding box and scale content to fit within sz with margin
  let minX=Math.min(...pts.map(p=>p.x)), maxX=Math.max(...pts.map(p=>p.x));
  let minY=Math.min(...pts.map(p=>p.y)), maxY=Math.max(...pts.map(p=>p.y));
  const bw=maxX-minX, bh=maxY-minY;
  const margin=sz*0.06;
  const avail=sz-margin*2;
  const scale=Math.min(1, avail/Math.max(bw,bh,1));
  // center the bounding box in the viewport after scaling
  const bcx=(minX+maxX)/2, bcy=(minY+maxY)/2;
  const tx=cx-bcx*scale, ty=cy-bcy*scale;
  return`<svg width="${sz}" height="${sz}" viewBox="0 0 ${sz} ${sz}" xmlns="http://www.w3.org/2000/svg"><g transform="translate(${tx.toFixed(2)},${ty.toFixed(2)}) scale(${scale.toFixed(3)})">${out}</g></svg>`;
}


const CANVAS_SIZE=230,CANVAS_CX=115,CANVAS_CY=115,ROAD_LEN=88;
let dragIdx=null,dotIdx=null,dragParent=null;

function angleToDot(a,ox,oy){ox=ox??CANVAS_CX;oy=oy??CANVAS_CY;const r=a*(Math.PI/180);return{x:ox+Math.sin(r)*ROAD_LEN,y:oy-Math.cos(r)*ROAD_LEN};}
function dotToAngle(x,y,ox,oy){ox=ox??CANVAS_CX;oy=oy??CANVAS_CY;return(Math.atan2(x-ox,-(y-oy))*(180/Math.PI)+360)%360;}
function snapAngle(a){return Math.round(a/15)*15;}

function flattenStreets(streets){
  const out=[];
  streets.forEach((st,i)=>{
    out.push({st,parentIdx:null,idx:i,depth:0,label:String(i+1)});
    (st.children||[]).forEach((ch,j)=>{
      out.push({st:ch,parentIdx:i,idx:j,depth:1,label:`${i+1}${String.fromCharCode(65+j)}`});
    });
  });
  return out;
}
function allDots(streets){
  const dots=[];
  streets.forEach((st,i)=>{
    const d=angleToDot(st.angle);
    dots.push({x:d.x,y:d.y,parentIdx:null,idx:i,depth:0});
    (st.children||[]).forEach((ch,j)=>{
      const cd=angleToDot(ch.angle,d.x,d.y);
      dots.push({x:cd.x,y:cd.y,parentIdx:i,idx:j,depth:1});
    });
  });
  return dots;
}
function _drawArrow(ctx,ox,oy,angle,len){
  len=len||ROAD_LEN;
  const r=angle*(Math.PI/180),as=8,ae=len*0.78,hl=Math.max(6,len*0.12),hw=Math.max(4,len*0.09);
  const ax1=ox+Math.sin(r)*as,ay1=oy-Math.cos(r)*as;
  const ax2=ox+Math.sin(r)*ae,ay2=oy-Math.cos(r)*ae;
  const abx=ax2-Math.sin(r)*hl,aby=ay2+Math.cos(r)*hl;
  ctx.strokeStyle='#378ADD';ctx.lineWidth=2;ctx.setLineDash([]);
  ctx.beginPath();ctx.moveTo(ax1,ay1);ctx.lineTo(abx,aby);ctx.stroke();
  ctx.fillStyle='#378ADD';ctx.beginPath();ctx.moveTo(ax2,ay2);ctx.lineTo(abx+Math.cos(r)*hw,aby+Math.sin(r)*hw);ctx.lineTo(abx-Math.cos(r)*hw,aby-Math.sin(r)*hw);ctx.closePath();ctx.fill();
}
function calcRoadLen(streets){
  // Start with max road len and shrink until everything fits
  // Each street goes ROAD_LEN from center, children go ROAD_LEN from parent tip
  // Max distance from center = ROAD_LEN (main) + ROAD_LEN (child) = 2*ROAD_LEN
  // We want max distance + margin <= CANVAS_SIZE/2
  const hasChildren=streets.some(s=>(s.children||[]).length>0);
  const maxDepth=hasChildren?2:1;
  const margin=18; // px margin from edge
  const maxDist=(CANVAS_SIZE/2)-margin;
  // max road len so that maxDepth*len <= maxDist
  return Math.floor(maxDist/maxDepth);
}

function drawJuncCanvas(){
  if(sel===null||!steps[sel]||steps[sel].tid!=='kruispunt')return;
  const canvas=document.getElementById('junc-canvas');if(!canvas)return;
  const s=steps[sel],streets=s.junc_streets||[];
  const dpr=window.devicePixelRatio||1;
  canvas.width=CANVAS_SIZE*dpr;canvas.height=CANVAS_SIZE*dpr;
  canvas.style.width=CANVAS_SIZE+'px';canvas.style.height=CANVAS_SIZE+'px';
  const ctx=canvas.getContext('2d');
  ctx.scale(dpr,dpr);ctx.clearRect(0,0,CANVAS_SIZE,CANVAS_SIZE);
  const isDark=window.matchMedia('(prefers-color-scheme:dark)').matches;
  const lc=isDark?'#e0e0e0':'#1a1a1a';
  const roadLen=calcRoadLen(streets);
  ctx.lineCap='round';
  // base road
  ctx.strokeStyle=lc;ctx.lineWidth=3;ctx.setLineDash([]);
  ctx.beginPath();ctx.moveTo(CANVAS_CX,CANVAS_CY);ctx.lineTo(CANVAS_CX,CANVAS_CY+roadLen);ctx.stroke();
  ctx.fillStyle=lc;ctx.beginPath();ctx.arc(CANVAS_CX,CANVAS_CY+roadLen,5,0,Math.PI*2);ctx.fill();
  // streets + children
  streets.forEach((st,i)=>{
    const r0=st.angle*(Math.PI/180);
    const dx=CANVAS_CX+Math.sin(r0)*roadLen,dy=CANVAS_CY-Math.cos(r0)*roadLen;
    ctx.strokeStyle=lc;ctx.lineWidth=3;ctx.setLineDash([]);
    ctx.beginPath();ctx.moveTo(CANVAS_CX,CANVAS_CY);ctx.lineTo(dx,dy);ctx.stroke();
    if(st.isArrow)_drawArrow(ctx,CANVAS_CX,CANVAS_CY,st.angle,roadLen);
    (st.children||[]).forEach((ch,j)=>{
      const r1=ch.angle*(Math.PI/180);
      const cx2=dx+Math.sin(r1)*roadLen,cy2=dy-Math.cos(r1)*roadLen;
      ctx.strokeStyle=lc;ctx.lineWidth=2;ctx.setLineDash([4,3]);
      ctx.beginPath();ctx.moveTo(dx,dy);ctx.lineTo(cx2,cy2);ctx.stroke();
      ctx.setLineDash([]);
      if(ch.isArrow)_drawArrow(ctx,dx,dy,ch.angle,roadLen);
      const dots=allDotsScaled(streets,roadLen);
      const isHover=dotIdx!==null&&dots[dotIdx]?.parentIdx===i&&dots[dotIdx]?.idx===j;
      ctx.fillStyle=isHover?'#378ADD':'#7BB8F0';ctx.strokeStyle='white';ctx.lineWidth=1.5;
      ctx.beginPath();ctx.arc(cx2,cy2,5,0,Math.PI*2);ctx.fill();ctx.stroke();
    });
  });
  // main dots
  const dots=allDotsScaled(streets,roadLen);
  streets.forEach((st,i)=>{
    const r0=st.angle*(Math.PI/180);
    const dx=CANVAS_CX+Math.sin(r0)*roadLen,dy=CANVAS_CY-Math.cos(r0)*roadLen;
    const isHover=dotIdx!==null&&dots[dotIdx]?.parentIdx===null&&dots[dotIdx]?.idx===i;
    ctx.fillStyle=isHover?'#378ADD':'#888';ctx.strokeStyle='white';ctx.lineWidth=1.5;
    ctx.beginPath();ctx.arc(dx,dy,7,0,Math.PI*2);ctx.fill();ctx.stroke();
  });
  ctx.fillStyle=lc;ctx.setLineDash([]);ctx.beginPath();ctx.arc(CANVAS_CX,CANVAS_CY,4,0,Math.PI*2);ctx.fill();
}

function allDotsScaled(streets,roadLen){
  const dots=[];
  streets.forEach((st,i)=>{
    const r=st.angle*(Math.PI/180);
    const dx=CANVAS_CX+Math.sin(r)*roadLen,dy=CANVAS_CY-Math.cos(r)*roadLen;
    dots.push({x:dx,y:dy,parentIdx:null,idx:i,depth:0});
    (st.children||[]).forEach((ch,j)=>{
      const r2=ch.angle*(Math.PI/180);
      const cx2=dx+Math.sin(r2)*roadLen,cy2=dy-Math.cos(r2)*roadLen;
      dots.push({x:cx2,y:cy2,parentIdx:i,idx:j,depth:1});
    });
  });
  return dots;
}
function juncDown(e){
  if(sel===null||!steps[sel])return;
  const streets=steps[sel].junc_streets||[];
  const roadLen=calcRoadLen(streets);
  const rect=e.currentTarget.getBoundingClientRect(),mx=e.clientX-rect.left,my=e.clientY-rect.top;
  const dots=allDotsScaled(streets,roadLen);let cl=-1,md=15;
  dots.forEach((dot,i)=>{const dist=Math.hypot(mx-dot.x,my-dot.y);if(dist<md){md=dist;cl=i;}});
  if(cl>=0){dragIdx=dots[cl].idx;dragParent=dots[cl].parentIdx;dotIdx=cl;}
}
function juncMove(e){
  if(sel===null||!steps[sel])return;
  const streets=steps[sel].junc_streets||[];
  const roadLen=calcRoadLen(streets);
  const rect=e.currentTarget.getBoundingClientRect(),mx=e.clientX-rect.left,my=e.clientY-rect.top;
  if(dragIdx!==null){
    if(dragParent!==null){
      const r0=streets[dragParent].angle*(Math.PI/180);
      const px=CANVAS_CX+Math.sin(r0)*roadLen,py=CANVAS_CY-Math.cos(r0)*roadLen;
      streets[dragParent].children[dragIdx].angle=snapAngle(dotToAngle(mx,my,px,py));
    } else {
      streets[dragIdx].angle=snapAngle(dotToAngle(mx,my));
    }
    drawJuncCanvas();renderStreetList();render();
  } else {
    const dots=allDotsScaled(streets,roadLen);let f=-1;
    dots.forEach((dot,i)=>{if(Math.hypot(mx-dot.x,my-dot.y)<12)f=i;});
    if(f!==dotIdx){dotIdx=f;drawJuncCanvas();}
  }
}
function juncUp(){dragIdx=null;dragParent=null;}
function renderStreetList(){
  const el=document.getElementById('street-list');if(!el||sel===null||!steps[sel])return;
  const streets=steps[sel].junc_streets||[];
  const flat=flattenStreets(streets);
  el.innerHTML=flat.map(({st,depth,label,parentIdx,idx})=>`<div class="junc-street-row" style="${depth?'margin-left:18px;background:#eef4fc;border-color:#c2d9f5':''}">
    <div class="junc-street-dot" style="background:${depth?'#7BB8F0':'#378ADD'}"></div>
    <span class="junc-street-label">${label} — ${Math.round(st.angle)}°</span>
    <label style="display:flex;align-items:center;gap:4px;font-size:11px;color:#aaa;cursor:pointer">
      <input type="checkbox" class="junc-arrow-check" ${st.isArrow?'checked':''} onchange="${depth?`toggleChildArrow(${parentIdx},${idx},this.checked)`:`toggleArrow(${idx},this.checked)`}"/> pijl
    </label>
    ${!depth?`<button style="font-size:10px;color:#378ADD;background:transparent;border:0.5px solid #378ADD;border-radius:4px;padding:1px 5px;cursor:pointer;flex-shrink:0" onclick="addChild(${idx})">+A</button>`:''}
    <button class="junc-del-btn" onclick="${depth?`delChild(${parentIdx},${idx})`:`delStreet(${idx})`}">×</button>
  </div>`).join('');
}
function toggleArrow(i,v){if(sel===null)return;steps[sel].junc_streets[i].isArrow=v;render();drawJuncCanvas();renderStreetList();}
function toggleChildArrow(pi,ci,v){if(sel===null)return;steps[sel].junc_streets[pi].children[ci].isArrow=v;render();drawJuncCanvas();renderStreetList();}
function delStreet(i){if(sel===null)return;steps[sel].junc_streets.splice(i,1);render();renderD();}
function delChild(pi,ci){if(sel===null)return;steps[sel].junc_streets[pi].children.splice(ci,1);render();renderD();}
function addChild(pi){
  if(sel===null)return;
  const parent=steps[sel].junc_streets[pi];
  if(!parent.children)parent.children=[];
  const ex=parent.children.map(c=>c.angle);
  const cands=[45,315,90,270,0,135,225,30,60,120,150,210,240,300,330];
  let best=45;for(const c of cands){if(!ex.some(a=>Math.abs(a-c)<20)){best=c;break;}}
  parent.children.push({angle:best,isArrow:false});
  render();renderD();setTimeout(()=>{setupJunc();drawJuncCanvas();renderStreetList();},50);
}
function addStreet(){
  if(sel===null)return;
  const ex=steps[sel].junc_streets.map(s=>s.angle);

function clockAnalog(sz,hour,min){
  const cx=sz/2,cy=sz/2,r=sz*0.4,col='#1a1a1a',lw=Math.max(1.2,sz*0.028);

  // hour ticks
  for(let i=0;i<12;i++){
    const a=i*30*Math.PI/180,dx=Math.sin(a),dy=-Math.cos(a);
    const t1=r*0.86,t2=r*(i%3===0?0.72:0.80);
    out+=`<line x1="${(cx+dx*t1).toFixed(1)}" y1="${(cy+dy*t1).toFixed(1)}" x2="${(cx+dx*t2).toFixed(1)}" y2="${(cy+dy*t2).toFixed(1)}" stroke="${col}" stroke-width="${i%3===0?lw:lw*0.6}" stroke-linecap="round"/>`;
  }
  // hands
  const h=(hour%12)+min/60;
  const ha=h*30*Math.PI/180, ma=min*6*Math.PI/180;
  const hlen=r*0.5, mlen=r*0.72;
  out+=`<line x1="${cx}" y1="${cy}" x2="${(cx+Math.sin(ha)*hlen).toFixed(1)}" y2="${(cy-Math.cos(ha)*hlen).toFixed(1)}" stroke="${col}" stroke-width="${lw*1.4}" stroke-linecap="round"/>`;
  out+=`<line x1="${cx}" y1="${cy}" x2="${(cx+Math.sin(ma)*mlen).toFixed(1)}" y2="${(cy-Math.cos(ma)*mlen).toFixed(1)}" stroke="${col}" stroke-width="${lw}" stroke-linecap="round"/>`;
  out+=`<circle cx="${cx}" cy="${cy}" r="${sz*0.03}" fill="${col}"/>`;
  out+=`</svg>`;
  return out;
}

// ── resize drag ───────────────────────────────────────────────────────────────
let _ri=null,_rx0=0,_ry0=0,_rw0=0,_rh0=0,_raxis='wh';
function startResize(e,i,axis){
  e.stopPropagation();e.preventDefault();
  _ri=i;_rx0=e.clientX;_ry0=e.clientY;_raxis=axis||'wh';
  _rw0=steps[i].card_w||100;_rh0=steps[i].card_h||100;
  document.addEventListener('mousemove',doResize);
  document.addEventListener('mouseup',endResize);
}
function doResize(e){
  if(_ri===null)return;
  const dw=e.clientX-_rx0,dh=e.clientY-_ry0;
  if(_raxis==='w'||_raxis==='wh'){
    const raw=Math.max(MIN_CARD,Math.min(MAX_CARD,_rw0+dw));
    steps[_ri].card_w=Math.max(100,Math.round((raw+10)/110)*110-10);
  }
  if(_raxis==='h'||_raxis==='wh'){
    const raw=Math.max(MIN_CARD,Math.min(MAX_CARD,_rh0+dh));
    steps[_ri].card_h=Math.max(100,Math.round((raw+10)/110)*110-10);
  }
  const s=steps[_ri];
  const w=s.card_w,h=s.card_h;
  const card=document.getElementById('card-'+_ri);
  if(card){
    card.style.width=w+'px';
    card.style.height=h+'px';
    card.style.gridRow=`span ${h+10}`;
    card.style.gridColumn=`span ${Math.max(1,Math.round((w+10)/110))}`;
    const sz=Math.max(40,Math.min(w,h)-16);
    const icon=card.querySelector('.icon');
    if(icon){
      icon.style.width=sz+'px';icon.style.height=sz+'px';
      if(s.tid==='helicopter')icon.innerHTML=heliSvg(s.arrows||[],sz);
      else if(s.tid==='stripkaart')icon.innerHTML=stripSvg(s.strip_steps||[],sz,null);
    }
  }
}
function endResize(){
  document.removeEventListener('mousemove',doResize);
  document.removeEventListener('mouseup',endResize);
  _ri=null;
}
