    <input type="text" maxlength="12" value="${s.lantern_text||''}" placeholder="bijv. 12 of A3" oninput="setLanternText(this.value)" style="width:100%;background:#f5f4f0;border:0.5px solid rgba(0,0,0,0.15);border-radius:8px;padding:8px 10px;font-family:'DM Sans',sans-serif;font-size:14px;color:#1a1a1a;outline:none"/>`;
  }
  if(s.tid==='klokjes'){
    h+=`<div id="clock-preview" style="display:flex;justify-content:center;margin-bottom:14px">${clockCard(s,120)}</div>`;
    h+=`<p class="sec-label">Type klok</p>`;
    h+=`<button type="button" onclick="setClockMode('analog')" class="om-btn${(s.clock_mode||'analog')==='analog'?' active':''}"><span class="om-check">${TICK_SVG}</span><span class="om-label">Analoog</span></button>`;
    h+=`<button type="button" onclick="setClockMode('digital')" class="om-btn${s.clock_mode==='digital'?' active':''}"><span class="om-check">${TICK_SVG}</span><span class="om-label">Digitaal</span></button>`;
    h+=`<p class="sec-label" style="margin-top:10px">Tijd</p>
    <div style="display:flex;align-items:center;gap:8px">
      <input id="clock-hour-in" type="text" inputmode="numeric" maxlength="2" value="${String(s.clock_hour??12).padStart(2,'0')}" oninput="this.value=this.value.replace(/\D/g,'');if(parseInt(this.value)>23)this.value='23';setClockHour(this.value)" onblur="this.value=String(steps[${sel}].clock_hour??12).padStart(2,'0')" onfocus="this.select()" style="width:56px;text-align:center;background:#f5f4f0;border:0.5px solid rgba(0,0,0,0.15);border-radius:8px;padding:8px;font-family:'DM Sans',sans-serif;font-size:16px;font-weight:600;color:#1a1a1a;outline:none"/>
      <span style="font-size:18px;font-weight:600;color:#1a1a1a">:</span>
      <input id="clock-min-in" type="text" inputmode="numeric" maxlength="2" value="${String(s.clock_min??0).padStart(2,'0')}" oninput="this.value=this.value.replace(/\D/g,'');if(parseInt(this.value)>59)this.value='59';setClockMin(this.value)" onblur="this.value=String(steps[${sel}].clock_min??0).padStart(2,'0')" onfocus="this.select()" style="width:56px;text-align:center;background:#f5f4f0;border:0.5px solid rgba(0,0,0,0.15);border-radius:8px;padding:8px;font-family:'DM Sans',sans-serif;font-size:16px;font-weight:600;color:#1a1a1a;outline:none"/>
      <span style="font-size:11px;color:#aaa">uur : min</span>
    </div>`;
  }
  h+=`<div class="div"></div><button class="del-btn" onclick="delStep(${sel})">stap verwijderen</button>`;
  el.innerHTML=h;
  if(s.tid==='kruispunt')setTimeout(()=>{setupJunc();drawJuncCanvas();renderStreetList();},10);
}
function sDir(id,angle){if(sel===null)return;steps[sel].dir_id=id;steps[sel].dir_angle=angle;render();renderD();}
function gInput(inp){if(sel===null)return;const raw=inp.value.replace(/\D/g,'');inp.value=raw;if(raw==='')return;let n=Math.max(1,Math.min(360,parseInt(raw)||1));steps[sel].graden=n;render();const lbl=document.querySelector('#detailInner p[style*="DM Serif"]');if(lbl){const s2=steps[sel];lbl.textContent=String(n).padStart(3,'0')+'°'+(s2.oost_om?' OO':s2.west_om?' WO':'');}}
function gBlur(inp){if(sel===null)return;let n=Math.max(1,Math.min(360,parseInt(inp.value)||1));steps[sel].graden=n;inp.value=String(n).padStart(3,'0');render();renderD();}
function toggleOO(){if(sel===null)return;const s=steps[sel];s.oost_om=!s.oost_om;if(s.oost_om)s.west_om=false;render();renderD();}
function toggleWO(){if(sel===null)return;const s=steps[sel];s.west_om=!s.west_om;if(s.west_om)s.oost_om=false;render();renderD();}
function heliAdd(){if(sel===null)return;steps[sel].arrows.push({deg:45});render();renderD();}
function heliRem(){if(sel===null)return;if(steps[sel].arrows.length<=1)return;steps[sel].arrows.pop();render();renderD();}
function hDegIn(inp,i){if(sel===null)return;const raw=inp.value.replace(/\D/g,'');inp.value=raw;if(raw==='')return;let n=Math.max(1,Math.min(360,parseInt(raw)||1));steps[sel].arrows[i].deg=n;render();}
function hDegBlur(inp,i){if(sel===null)return;let n=Math.max(1,Math.min(360,parseInt(inp.value)||1));steps[sel].arrows[i].deg=n;inp.value=String(n).padStart(3,'0');render();renderD();}
function setEyeDir(id){if(sel===null)return;steps[sel].eye_dir=id;render();renderD();}
// Auto-size strippenkaart height to fit all steps
// Uses same proportions as stripSvg: SH=22*sc where sc=sz/140, sz=card_w
function syncStripHeight(s){
  if(s.tid!=='stripkaart')return;
  const w=s.card_w||100;
  const sz=Math.max(40,w-16);
  const sc=sz/140;
  const SH=22*sc,PT=8*sc,PB=8*sc;
  const n=s.strip_steps?s.strip_steps.length:1;
  const svgH=PT+n*SH+PB;
  // always update to exact needed height — let user resize after
  s.card_h=Math.max(100,Math.ceil(svgH+16));
}
function stripCountInput(inp){const raw=inp.value.replace(/\D/g,'');inp.value=raw;}
function stripCountBlur(inp){
  if(sel===null)return;
  const n=Math.max(1,Math.min(99,parseInt(inp.value)||1));
  inp.value=n;
  const s=steps[sel];
  const cur=s.strip_steps.length;
  if(n>cur){for(let i=cur;i<n;i++)s.strip_steps.push({left:0,right:0});}
  else if(n<cur){s.strip_steps=s.strip_steps.slice(0,n);if((s._selStrip||0)>=n)s._selStrip=null;}
  syncStripHeight(s);render();renderD();
}
function stripAdd(){if(sel===null)return;steps[sel].strip_steps.push({left:0,right:0});syncStripHeight(steps[sel]);render();renderD();}
function stripRem(){if(sel===null)return;const ss=steps[sel].strip_steps;if(ss.length<=1)return;ss.pop();if(steps[sel]._selStrip>=ss.length)steps[sel]._selStrip=null;syncStripHeight(steps[sel]);render();renderD();}
function stripAdj(si,side,delta){if(sel===null)return;const ss=steps[sel].strip_steps;ss[si][side]=Math.max(0,Math.min(8,ss[si][side]+delta));render();renderD();}

function setTotalStepsDirect(n){
  n=Math.max(0,Math.min(999,n));
  const inp=document.getElementById('total-count');
  if(inp)inp.value=n;
  const cur=steps.length;
  if(n>cur){for(let i=cur;i<n;i++)addStep();}
  else if(n<cur){steps.splice(n);sel=steps.length?Math.min(sel||0,steps.length-1):null;render();renderD();}
}
function setTotalSteps(inp){
  setTotalStepsDirect(parseInt(inp.value)||0);
}
// ── Detail panel resize ───────────────────────────────────────────────────────
let _drx0=0,_drw0=0;
function startDetailResize(e){
  e.preventDefault();
  _drx0=e.clientX;
  _drw0=document.getElementById('detail').offsetWidth;
  document.addEventListener('mousemove',doDetailResize);
  document.addEventListener('mouseup',endDetailResize);
}
function doDetailResize(e){
  const dx=_drx0-e.clientX; // drag left = wider
  const w=Math.max(250,Math.min(500,_drw0+dx));
  document.getElementById('detail').style.width=w+'px';
}
function endDetailResize(){
  document.removeEventListener('mousemove',doDetailResize);
  document.removeEventListener('mouseup',endDetailResize);
}
// ── mobile drawers ──
function isMobile(){return window.matchMedia('(max-width:820px)').matches;}
function techDrawer(){return document.getElementById('techbar');}
function detailDrawer(){return document.getElementById('detail-wrap');}
function syncScrim(){
  const any=techDrawer().classList.contains('drawer-open')||detailDrawer().classList.contains('drawer-open');
  document.getElementById('mobile-scrim').classList.toggle('show',any);
  document.getElementById('tech-tab')?.classList.toggle('open',techDrawer().classList.contains('drawer-open'));
  document.getElementById('detail-tab')?.classList.toggle('open',detailDrawer().classList.contains('drawer-open'));
}
function toggleTech(){
  const open=techDrawer().classList.toggle('drawer-open');
  if(open)detailDrawer().classList.remove('drawer-open');
  syncScrim();
}
function toggleDetailDrawer(){
  const open=detailDrawer().classList.toggle('drawer-open');
  if(open)techDrawer().classList.remove('drawer-open');
  syncScrim();
}
function openDetailDrawer(){
  if(!isMobile())return;
  detailDrawer().classList.add('drawer-open');
  techDrawer().classList.remove('drawer-open');
  syncScrim();
}
function closeDrawers(){
  techDrawer().classList.remove('drawer-open');
  detailDrawer().classList.remove('drawer-open');
  syncScrim();
}
window.addEventListener('resize',()=>{if(!isMobile())closeDrawers();});

renderTB();render();renderD();
document.getElementById('addBtn').addEventListener('click',addStep);
</script>
